name: runanywhere_flutter_workspace
publish_to: none

environment:
  sdk: '>=3.12.0 <4.0.0'

workspace:
  - packages/runanywhere
  - packages/runanywhere_llamacpp
  - packages/runanywhere_mlx
  - packages/runanywhere_onnx
  - packages/runanywhere_qhexrt

dev_dependencies:
  melos: ^7.7.0

melos:
  command:
    version:
      workspaceChangelog: true

    bootstrap:
      runPubGetInParallel: true

  # Flutter dependency centralization (Tier 4 - PR #494 T4.4).
  #
  # Pub does NOT have a Gradle-version-catalog equivalent: there is no native
  # workspace-level dependency override mechanism. The previously documented
  # `melos.dependencies:` block was doc-only — Pub never read it, and
  # `scripts/validation/gates/check_flutter_centralization.sh` only caught the
  # `^x.y.z` literal-drift case (not the `any` resolution-drift case). It has
  # been removed to avoid false confidence.
  #
  # Current centralization model:
  #   - The `packages/runanywhere` package is the source of truth for every
  #     third-party constraint shared across the workspace.
  #   - Backend sub-packages (`runanywhere_llamacpp`, `runanywhere_mlx`,
  #     `runanywhere_onnx`, `runanywhere_qhexrt`) should use the same shared-dependency major
  #     range as the root package, expressed as a bounded publishable range
  #     (for example `>=2.2.0 <3.0.0`) when pub.dev rejects `any`.
  #   - The linter still flags hardcoded `^x.y.z` literals in sub-packages.
  #   - True enforcement (parsing each generated `pubspec.lock` and asserting
  #     versions match) is tracked as future work — see pass2-syn-121.

  scripts:
    analyze:
      run: dart run melos exec -c 1 -- flutter analyze --no-pub .
      description: Run flutter analyze in all packages

    format:
      run: dart run melos exec -- dart format .
      description: Run dart format in all packages

    test:
      run: dart run melos exec -c 1 --dir-exists=test -- flutter test --no-pub
      description: Run tests in all packages

    clean:
      run: dart run melos exec -- flutter clean
      description: Run flutter clean in all packages
