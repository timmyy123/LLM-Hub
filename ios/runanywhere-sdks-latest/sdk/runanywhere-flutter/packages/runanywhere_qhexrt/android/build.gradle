group = 'ai.runanywhere.sdk.qhexrt'
version = '0.20.9'

apply plugin: 'com.android.library'

android {
    namespace = 'ai.runanywhere.sdk.qhexrt'
    compileSdk = 36

    ndkVersion = rootProject.hasProperty("racFlutterNdkVersion") ? rootProject.property("racFlutterNdkVersion") : "28.2.13676358"

    defaultConfig {
        minSdk = 24
        targetSdk = 36
        // QHexRT is Qualcomm-only (Snapdragon Hexagon NPU): arm64-v8a exclusively.
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
            assets.srcDirs = ['src/main/assets']
        }
    }

    buildTypes {
        release {
            minifyEnabled = false
        }
    }

    packaging {
        jniLibs {
            // Shared libs also shipped by the core runanywhere plugin: keep one.
            pickFirsts += ['**/libc++_shared.so', '**/librac_commons.so']
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

// Host/stub libraries are staged as JNI libraries. FastRPC DSP Skel.so files
// are staged as assets, then copied to an app-private directory at runtime.
def qhexrtJniLibsDir = file('src/main/jniLibs/arm64-v8a')
def qhexrtSkelAssetsDir = file('src/main/assets/runanywhere/qhexrt/skels/arm64-v8a')
def misplacedSkels = fileTree(qhexrtJniLibsDir) {
    include 'libQnnHtpV*Skel.so'
}.files
if (!misplacedSkels.isEmpty()) {
    throw new GradleException("[runanywhere_qhexrt] DSP Skel.so files must be staged under " +
            "${qhexrtSkelAssetsDir}, not ${qhexrtJniLibsDir}: " +
            misplacedSkels.collect { it.name }.sort().join(', '))
}
if (!qhexrtJniLibsDir.isDirectory() || (qhexrtJniLibsDir.list() ?: new String[0]).length == 0) {
    logger.warn("[runanywhere_qhexrt] WARNING: ${qhexrtJniLibsDir} is missing or empty — " +
            "the private QHexRT native libraries are not staged. Run " +
            "scripts/stage-natives.sh --natives-from <dir> to bundle them; without them " +
            "this is a stub build and the Hexagon NPU backend will be unavailable at runtime.")
}
if (!qhexrtSkelAssetsDir.isDirectory() ||
        fileTree(qhexrtSkelAssetsDir) { include 'libQnnHtpV*Skel.so' }.files.isEmpty()) {
    logger.warn("[runanywhere_qhexrt] WARNING: ${qhexrtSkelAssetsDir} has no DSP skels — " +
            "run scripts/stage-natives.sh before using QHexRT inference.")
}
