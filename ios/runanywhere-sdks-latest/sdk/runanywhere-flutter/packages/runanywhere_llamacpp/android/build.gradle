// RunAnywhere LlamaCPP Backend - Android
//
// This plugin bundles RABackendLlamaCPP native libraries (.so files) for Android.
// RABackendLlamaCPP provides LLM text generation capabilities using llama.cpp.
//
// Binary Configuration:
//   Edit binary_config.gradle to toggle between local and remote binaries:
//   - useLocalNatives = true:  Use local .so files from android/src/main/jniLibs/
//   - useLocalNatives = false: Download from GitHub releases
//
// Version: Must match Swift SDK's Package.swift and Kotlin SDK's build.gradle.kts

group = 'ai.runanywhere.sdk.llamacpp'
version = '0.20.9'

// Load binary configuration
apply from: 'binary_config.gradle'

apply plugin: 'com.android.library'

android {
    namespace = 'ai.runanywhere.sdk.llamacpp'
    compileSdk = 36

    // Flutter 3.44 NDK pin; consumers can override racFlutterNdkVersion.
    ndkVersion = rootProject.hasProperty("racFlutterNdkVersion") ? rootProject.property("racFlutterNdkVersion") : "28.2.13676358"

    defaultConfig {
        minSdk = 24
        targetSdk = 36

        // ABI filters for native libraries
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }

        // Consumer proguard rules
        consumerProguardFiles 'proguard-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            // Native libraries location - use downloaded libs or local libs based on config
            jniLibs.srcDirs = [useLocalNatives ? 'src/main/jniLibs' : 'build/jniLibs']
        }
    }

    buildTypes {
        release {
            minifyEnabled = false
        }
    }

    packaging {
        jniLibs {
            // Keep only one copy of libs that ship from multiple Flutter plugins.
            pickFirsts += ['**/libc++_shared.so', '**/librac_commons.so']
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

import java.security.MessageDigest

def calculateChecksum(File file) {
    MessageDigest digest = MessageDigest.getInstance("SHA-256")
    file.withInputStream { stream ->
        byte[] buffer = new byte[8192]
        int read
        while ((read = stream.read(buffer)) > 0) {
            digest.update(buffer, 0, read)
        }
    }
    return digest.digest().collect { String.format("%02x", it) }.join('')
}

def verifyDownloadedArchive(File archive, String downloadUrl) {
    def checksumFile = new File(archive.parentFile, "${archive.name}.sha256")
    ant.get(src: "${downloadUrl}.sha256", dest: checksumFile)
    def matcher = checksumFile.text.trim() =~ /^([0-9a-fA-F]{64})\s+\*?(.+)$/
    if (!matcher.matches()) {
        throw new GradleException("Malformed checksum sidecar for ${archive.name}")
    }
    def declaredName = new File(matcher.group(2)).name
    def expectedName = new File(new URI(downloadUrl).path).name
    if (declaredName != expectedName) {
        throw new GradleException("Checksum sidecar names ${declaredName}, expected ${expectedName}")
    }
    def expected = matcher.group(1).toLowerCase()
    def actual = calculateChecksum(archive)
    if (actual != expected) {
        throw new GradleException("Checksum mismatch for ${archive.name}: expected ${expected}, got ${actual}")
    }
    delete(checksumFile)
}

// =============================================================================
// Binary Download Task (runs when useLocalNatives = false)
// =============================================================================
task downloadNativeLibs {
    group = 'runanywhere'
    description = 'Download RABackendLlamaCPP native libraries from GitHub releases'

    doLast {
        if (shouldDownloadAndroidLibs()) {
            println "📦 Remote mode: Downloading RABackendLlamaCPP Android native libraries..."

            def jniLibsDir = file('build/jniLibs')
            if (jniLibsDir.exists()) {
                delete(jniLibsDir)
            }
            jniLibsDir.mkdirs()

            buildDir.mkdirs()
            def requiredLibs = [
                'libc++_shared.so',
                'librac_backend_llamacpp.so',
                'librac_backend_llamacpp_jni.so',
                'librunanywhere_llamacpp.so',
            ]
            llamacppAndroidUrls.each { abi, downloadUrl ->
                def zipFile = file("${buildDir}/llamacpp-${abi}.zip")
                def tempDir = file("${buildDir}/llamacpp-${abi}-temp")
                delete(zipFile, tempDir)
                tempDir.mkdirs()
                println "Downloading from: ${downloadUrl}"
                ant.get(src: downloadUrl, dest: zipFile)
                verifyDownloadedArchive(zipFile, downloadUrl)
                copy { from zipTree(zipFile); into tempDir }

                def sourceDir = new File(tempDir, "${abi}/llamacpp")
                def targetAbiDir = new File(jniLibsDir, abi)
                targetAbiDir.mkdirs()
                requiredLibs.each { libName ->
                    def source = new File(sourceDir, libName)
                    if (!source.isFile()) {
                        throw new GradleException("Release archive is missing ${abi}/${libName}")
                    }
                    copy { from source; into targetAbiDir }
                    println "  ✓ ${abi}/${libName}"
                }
                delete(zipFile, tempDir)
            }

            println "✅ RABackendLlamaCPP native libraries downloaded successfully"
        } else {
            println "🔧 Local mode: Using native libraries from src/main/jniLibs/"

            if (!checkLocalLibsExist()) {
                throw new GradleException("""
                    ⚠️  Native libraries not found in src/main/jniLibs/!
                    For local mode, build a canonical one-ABI archive and stage it:
                      1. cd sdk/runanywhere-commons && ./scripts/build-android.sh arm64-v8a
                      2. Extract dist/RACommons-android-arm64-v8a-v*.zip into <natives-root>
                      3. cd ../runanywhere-flutter && ./scripts/package-sdk.sh --natives-from <natives-root>
                    Or use remote mode with -Prunanywhere.useLocalNatives=false.
                """)
            } else {
                println "✅ Using local native libraries"
            }
        }
    }
}

// Run downloadNativeLibs before preBuild
preBuild.dependsOn downloadNativeLibs
