def coreVersionFile = file("${projectDir.canonicalPath}/../../../../runanywhere-commons/VERSION")

// =============================================================================
// BINARY CONFIGURATION FOR RUNANYWHERE FLUTTER SDK - ANDROID (LlamaCPP Package)
// =============================================================================
// This file controls whether to use local or remote native libraries (.so files).
// Mirrors the explicit local-native opt-in used by the other SDKs.
//
// Set to `true` to use local binaries from android/src/main/jniLibs/
// Set to `false` to download binaries from GitHub releases (production mode)
// =============================================================================

ext {
    // =============================================================================
    // Version Configuration (MUST match Swift Package.swift and Kotlin build.gradle.kts)
    // =============================================================================
    fallbackCoreVersion = "0.20.9"
    coreVersion = coreVersionFile.exists() ? coreVersionFile.text.trim() : fallbackCoreVersion

    // =============================================================================
    // Remote binary URLs
    // RABackendLlamaCPP from runanywhere-sdks
    // =============================================================================
    binariesGitHubOrg = "RunanywhereAI"
    binariesRepo = "runanywhere-sdks"
    binariesBaseUrl = project.findProperty("runanywhere.releaseBaseUrl")?.toString()
        ?: "https://github.com/${binariesGitHubOrg}/${binariesRepo}/releases/download"

    // Android native libraries package
    androidAbis = ['arm64-v8a', 'armeabi-v7a', 'x86_64']
    llamacppAndroidUrls = androidAbis.collectEntries { abi ->
        [(abi): "${binariesBaseUrl}/v${coreVersion}/RACommons-android-${abi}-v${coreVersion}.zip"]
    }

    // Helper method to check if local libs exist.
    // The engines CMake may emit either `librac_backend_llamacpp.so` (always)
    // and/or `librac_backend_llamacpp_jni.so` (Android JNI entry point, emitted
    // only when RAC_BUILD_SHARED=ON). Treat either as a valid indicator so we
    // don't fail the build when the JNI suffix isn't generated on every preset.
    checkLocalLibsExist = { ->
        def jniLibsDir = project.file('src/main/jniLibs')
        def arm64Dir = new File(jniLibsDir, 'arm64-v8a')

        if (!arm64Dir.exists() || !arm64Dir.isDirectory()) {
            return false
        }

        def backendLib = new File(arm64Dir, 'librac_backend_llamacpp.so')
        def backendJniLib = new File(arm64Dir, 'librac_backend_llamacpp_jni.so')
        return backendLib.exists() || backendJniLib.exists()
    }

    // Canonical name (matches Swift/Kotlin/RN and the runanywhere core plugin).
    //
    // Default selection rules (applied in order):
    //   1. Explicit override: respect `runanywhere.useLocalNatives` Gradle
    //      property when set (true/false).
    //   2. Otherwise auto-detect: use local .so files when monorepo's
    //      `scripts/build/build-core-android.sh` has staged them under
    //      `android/src/main/jniLibs/` (the only location the local branch
    //      consumes). Fall back to the remote download branch otherwise so
    //      clean Flutter Android consumer builds (which have no plugin-local
    //      jniLibs and don't know about the override) work out of the box.
    def localNativesProp = project.findProperty("runanywhere.useLocalNatives")
    if (localNativesProp != null) {
        useLocalNatives = localNativesProp.toString().toBoolean()
    } else {
        useLocalNatives = checkLocalLibsExist()
    }
    // Helper method to check if we should download
    shouldDownloadAndroidLibs = { ->
        return !useLocalNatives
    }
}
