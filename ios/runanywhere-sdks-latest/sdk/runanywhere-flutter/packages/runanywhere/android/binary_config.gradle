// =============================================================================
// BINARY CONFIGURATION FOR RUNANYWHERE FLUTTER SDK - ANDROID (Core Package)
// =============================================================================
// This file controls whether to use local or remote native libraries (.so files).
// Matches Swift Package.swift's `useLocalNatives` and Kotlin gradle property
// `runanywhere.useLocalNatives` — same semantics across all 5 SDKs.
//
// Set to `true` to use local binaries from android/src/main/jniLibs/
// Set to `false` to download binaries from GitHub releases (production mode)
//
// =============================================================================

def coreVersionFile = file("${projectDir.canonicalPath}/../../../../runanywhere-commons/VERSION")

ext {
    // =============================================================================
    // Version Configuration (MUST match Swift Package.swift and Kotlin build.gradle.kts)
    // =============================================================================
    fallbackCoreVersion = "0.20.9"
    coreVersion = coreVersionFile.exists() ? coreVersionFile.text.trim() : fallbackCoreVersion

    // =============================================================================
    // Remote binary URLs
    // RACommons from runanywhere-sdks (includes RAG pipeline)
    // =============================================================================
    commonsGitHubOrg = "RunanywhereAI"
    commonsRepo = "runanywhere-sdks"
    commonsBaseUrl = project.findProperty("runanywhere.releaseBaseUrl")?.toString()
        ?: "https://github.com/${commonsGitHubOrg}/${commonsRepo}/releases/download"

    // Android native libraries packages
    androidAbis = ['arm64-v8a', 'armeabi-v7a', 'x86_64']
    commonsAndroidUrls = androidAbis.collectEntries { abi ->
        [(abi): "${commonsBaseUrl}/v${coreVersion}/RACommons-android-${abi}-v${coreVersion}.zip"]
    }

    // Helper method to check if we should download
    shouldDownloadAndroidLibs = { ->
        return !useLocalNatives
    }

    // Helper method to check if local RACommons libs exist.
    // Both librac_commons.so (core C ABI) AND librunanywhere_jni.so (JNI bridge)
    // are required for the Flutter plugin to load successfully at runtime.
    checkLocalLibsExist = { ->
        def jniLibsDir = project.file('src/main/jniLibs')
        def arm64Dir = new File(jniLibsDir, 'arm64-v8a')

        if (!arm64Dir.exists() || !arm64Dir.isDirectory()) {
            return false
        }

        def commonsLib = new File(arm64Dir, 'librac_commons.so')
        def commonsJniLib = new File(arm64Dir, 'librunanywhere_jni.so')
        return commonsLib.exists() && commonsJniLib.exists()
    }

    // Clean/public consumers default to the remote artifacts. A monorepo
    // build auto-selects explicitly staged local binaries, and callers can
    // override either behavior with -Prunanywhere.useLocalNatives=true|false.
    def localNativesProp = project.findProperty("runanywhere.useLocalNatives")
    if (localNativesProp != null) {
        useLocalNatives = localNativesProp.toString().toBoolean()
    } else {
        useLocalNatives = checkLocalLibsExist()
    }
}
