// RunAnywhere Core SDK - Android
//
// This plugin bundles RACommons native libraries (.so files) for Android.
// RACommons provides the core infrastructure for on-device AI capabilities.
//
// Binary Configuration:
//   Edit binary_config.gradle to toggle between local and remote binaries:
//   - useLocalNatives = true:  Use local .so files from android/src/main/jniLibs/
//   - useLocalNatives = false: Download from GitHub releases
//
// Version: Must match Swift SDK's Package.swift and Kotlin SDK's build.gradle.kts

group = 'ai.runanywhere.sdk'
version = '0.20.9'

// Load binary configuration
apply from: 'binary_config.gradle'

apply plugin: 'com.android.library'

// Repositories for module-level dependencies (OkHttp, kotlin-stdlib)
repositories {
    google()
    mavenCentral()
}

def runAnywhereAndroidAbis = ['arm64-v8a', 'armeabi-v7a', 'x86_64']
if (useLocalNatives) {
    def localAbiDirs = file('src/main/jniLibs').listFiles()?.findAll { candidate ->
        candidate.isDirectory() && new File(candidate, 'librac_commons.so').isFile()
    }?.collect { it.name }?.sort()
    if (localAbiDirs && !localAbiDirs.isEmpty()) {
        runAnywhereAndroidAbis = localAbiDirs
    }
}

android {
    namespace = 'ai.runanywhere.sdk'
    compileSdk = 36

    // Flutter 3.44's Android toolchain pin. Prebuilt SDK libraries produced
    // with the repo's r27d native toolchain remain ABI-compatible; this NDK
    // compiles the Flutter JNI wrapper and satisfies the app's other plugins.
    // External apps may override via racFlutterNdkVersion.
    ndkVersion = rootProject.hasProperty("racFlutterNdkVersion") ? rootProject.property("racFlutterNdkVersion") : "28.2.13676358"

    defaultConfig {
        minSdk = 24
        targetSdk = 36

        // ABI filters for native libraries
        ndk {
            abiFilters(*runAnywhereAndroidAbis)
        }

        externalNativeBuild {
            cmake {
                abiFilters(*runAnywhereAndroidAbis)
                cppFlags '-frtti -fexceptions'
                arguments "-DRAC_FLUTTER_JNILIBS_DIR=${useLocalNatives ? file('src/main/jniLibs').absolutePath : file('build/jniLibs').absolutePath}"
            }
        }

        // Consumer proguard rules
        consumerProguardFiles 'proguard-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            // Native libraries location - use downloaded libs or local libs based on config
            jniLibs.srcDirs = [useLocalNatives ? 'src/main/jniLibs' : 'build/jniLibs']
        }
    }

    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
        }
    }

    buildTypes {
        release {
            minifyEnabled = false
        }
    }

    packaging {
        jniLibs {
            // Each Flutter plugin stages its own copy of libc++_shared.so and
            // librac_commons.so (the latter because downstream backends link
            // against it at runtime). pickFirsts lets AGP keep one copy in the
            // final APK instead of failing with a duplicate-file error.
            pickFirsts += ['**/libc++_shared.so', '**/librac_commons.so']
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    // OkHttp backs the platform HTTP transport. Routes `rac_http_request_*`
    // through the system trust store + HTTP/2 + proxies + NetworkSecurityConfig
    // instead of libcurl (deleted in Stage 5). Version must match the Kotlin
    // SDK and React Native core.
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
}

// =============================================================================
// Helper Functions
// =============================================================================
import java.security.MessageDigest

def calculateChecksum(File file) {
    MessageDigest digest = MessageDigest.getInstance("SHA-256")
    file.withInputStream { stream ->
        byte[] buffer = new byte[8192]
        int read
        while ((read = stream.read(buffer)) > 0) {
            digest.update(buffer, 0, read)
        }
    }
    return digest.digest().collect { String.format("%02x", it) }.join('')
}

def verifyDownloadedArchive(File archive, String downloadUrl) {
    def checksumFile = new File(archive.parentFile, "${archive.name}.sha256")
    ant.get(src: "${downloadUrl}.sha256", dest: checksumFile)
    def matcher = checksumFile.text.trim() =~ /^([0-9a-fA-F]{64})\s+\*?(.+)$/
    if (!matcher.matches()) {
        throw new GradleException("Malformed checksum sidecar for ${archive.name}")
    }
    def declaredName = new File(matcher.group(2)).name
    def expectedName = new File(new URI(downloadUrl).path).name
    if (declaredName != expectedName) {
        throw new GradleException("Checksum sidecar names ${declaredName}, expected ${expectedName}")
    }
    def expected = matcher.group(1).toLowerCase()
    def actual = calculateChecksum(archive)
    if (actual != expected) {
        throw new GradleException("Checksum mismatch for ${archive.name}: expected ${expected}, got ${actual}")
    }
    delete(checksumFile)
}

// =============================================================================
// Binary Download Task: RACommons (runs when useLocalNatives = false)
// =============================================================================
task downloadNativeLibs {
    group = 'runanywhere'
    description = 'Download RACommons native libraries from GitHub releases'

    doLast {
        if (shouldDownloadAndroidLibs()) {
            println "📦 Remote mode: Downloading RACommons Android native libraries..."

            def jniLibsDir = file('build/jniLibs')
            if (jniLibsDir.exists()) {
                delete(jniLibsDir)
            }
            jniLibsDir.mkdirs()

            buildDir.mkdirs()
            def requiredLibs = [
                'librac_commons.so',
                'librunanywhere_jni.so',
                'librac_backend_cloud.so',
                'libomp.so',
                'libc++_shared.so',
            ]
            commonsAndroidUrls.each { abi, downloadUrl ->
                def zipFile = file("${buildDir}/racommons-${abi}.zip")
                def tempDir = file("${buildDir}/racommons-${abi}-temp")
                delete(zipFile, tempDir)
                tempDir.mkdirs()

                println "Downloading from: ${downloadUrl}"
                ant.get(src: downloadUrl, dest: zipFile)
                verifyDownloadedArchive(zipFile, downloadUrl)
                copy {
                    from zipTree(zipFile)
                    into tempDir
                }

                def sourceDir = new File(tempDir, "${abi}/jni")
                def targetAbiDir = new File(jniLibsDir, abi)
                targetAbiDir.mkdirs()
                requiredLibs.each { libName ->
                    def source = new File(sourceDir, libName)
                    if (!source.isFile()) {
                        throw new GradleException("Release archive is missing ${abi}/${libName}")
                    }
                    copy { from source; into targetAbiDir }
                    println "  ✓ ${abi}/${libName}"
                }
                delete(zipFile, tempDir)
            }

            println "✅ RACommons native libraries downloaded successfully"
        } else {
            println "🔧 Local mode: Using native libraries from src/main/jniLibs/"

            if (!checkLocalLibsExist()) {
                throw new GradleException("""
                    ⚠️  Native libraries not found in src/main/jniLibs/!
                    For local mode, please build and copy the libraries:
                      1. cd runanywhere-commons && ./scripts/build-android.sh
                      2. Copy the .so files to packages/runanywhere/android/src/main/jniLibs/
                    Or use remote mode with -Prunanywhere.useLocalNatives=false.
                """)
            } else {
                println "✅ Using local native libraries"
            }
        }
    }
}

// Run downloadNativeLibs before preBuild (RAG pipeline is now part of RACommons)
preBuild.dependsOn downloadNativeLibs

tasks.matching { task ->
    task.name.startsWith('configureCMake') || task.name.startsWith('externalNativeBuild')
}.configureEach {
    dependsOn downloadNativeLibs
}
