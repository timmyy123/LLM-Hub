name: runanywhere_onnx
description: ONNX Runtime backend for RunAnywhere Flutter SDK. On-device Speech-to-Text, Text-to-Speech, and Voice Activity Detection.
version: 0.20.9
homepage: https://runanywhere.ai
repository: https://github.com/RunanywhereAI/runanywhere-sdks
issue_tracker: https://github.com/RunanywhereAI/runanywhere-sdks/issues
topics:
  - ai
  - onnx
  - speech-recognition
  - text-to-speech
  - on-device

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # Core SDK dependency (provides RACommons).
  # Backend packages must lockstep with the core/native ABI: the published
  # Each backend ships against same-version native binaries, so the version
  # range floor MUST match this release. The caret range still lets consumers
  # upgrade core within the compatible published minor suite.
  runanywhere: ^0.20.9
  # Keep this bounded for pub.dev publish validation, matching the core
  # package's major-version range.
  ffi: '>=2.2.0 <3.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  # Native plugin configuration
  # RABackendONNX binaries are bundled in ios/ and android/ directories
  plugin:
    platforms:
      android:
        package: ai.runanywhere.sdk.onnx
        pluginClass: OnnxPlugin
      ios:
        pluginClass: OnnxPlugin
