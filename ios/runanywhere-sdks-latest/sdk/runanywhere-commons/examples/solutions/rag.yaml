# RunAnywhere Solution — retrieval-augmented generation.
#
# Mirrors the Query → Embed → Retrieve → ContextBuild → LLM DAG T4.6
# landed. SolutionRunner expands this into a PipelineSpec (see
# solution_converter.cpp::expand_rag) and compiles it into a
# GraphScheduler graph.
#
# Model IDs match the canonical catalog seeded by every example app
# (iOS, Android, Flutter, React Native, Web). rerank_model_id is
# intentionally omitted: no example app seeds a reranker, and
# solution_converter.cpp treats an empty rerank_model_id as "skip
# reranking" (only adds it to params when non-empty).

rag:
  embed_model_id: "all-minilm-l6-v2"
  llm_model_id: "smollm2-360m-q8_0"

  vector_store: "usearch"
  vector_store_path: "/tmp/ra-rag.usearch"

  retrieve_k: 24
  rerank_top: 6

  bm25_k1: 1.2
  bm25_b: 0.75
  rrf_k: 60

  prompt_template: "Use the context below to answer.\n\nContext:\n{{context}}\n\nQuestion: {{query}}"
