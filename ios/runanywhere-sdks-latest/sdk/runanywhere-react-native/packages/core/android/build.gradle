// =============================================================================
// Node Binary Detection for Android Studio Compatibility
// Android Studio doesn't inherit terminal PATH, so we need to find node explicitly
// =============================================================================
def findNodeBinary() {
    // Check local.properties first (user can override)
    def localProperties = new Properties()
    def localPropertiesFile = rootProject.file("local.properties")
    if (localPropertiesFile.exists()) {
        localPropertiesFile.withInputStream { localProperties.load(it) }
        def nodePath = localProperties.getProperty("node.path")
        if (nodePath && new File(nodePath).exists()) {
            return nodePath
        }
    }

    // Honor the active toolchain before probing machine-global installations.
    def configuredNode = System.getenv("NODE_BINARY")
    if (configuredNode && new File(configuredNode).canExecute()) {
        return configuredNode
    }
    def pathNode = System.getenv("PATH")
        ?.split(File.pathSeparator)
        ?.collect { new File(it, "node") }
        ?.find { it.canExecute() }
    if (pathNode) {
        return pathNode.canonicalPath
    }

    // Check common node installation paths
    def homeDir = System.getProperty("user.home")
    def nodePaths = [
        "/opt/homebrew/bin/node",                    // macOS ARM (Apple Silicon)
        "/usr/local/bin/node",                       // macOS Intel / Linux
        "/usr/bin/node",                             // Linux system
        "${homeDir}/.nvm/current/bin/node",          // nvm
        "${homeDir}/.volta/bin/node",                // volta
        "${homeDir}/.asdf/shims/node"                // asdf
    ]
    for (path in nodePaths) {
        if (new File(path).exists()) {
            return path
        }
    }

    // Fallback to 'node' (works if PATH is set correctly in terminal builds)
    return "node"
}

def getExtOrDefault(name) {
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['RunAnywhereCore_' + name]
}

// Public packages ship the same three Android ABIs as the canonical native bundle.
// Can be overridden via gradle.properties: reactNativeArchitectures=arm64-v8a
def reactNativeArchitectures() {
    def value = rootProject.hasProperty("reactNativeArchitectures")
        ? rootProject.property("reactNativeArchitectures")
        : null
    return value ? value.split(",").collect { it.trim() } : ["arm64-v8a", "armeabi-v7a", "x86_64"]
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply from: '../nitrogen/generated/android/runanywherecore+autolinking.gradle'
apply plugin: 'com.facebook.react'

// Configure node path for Android Studio builds
// Set the react extension's nodeExecutableAndArgs after plugin is applied
def nodeBinary = findNodeBinary()
logger.lifecycle("[RunAnywhereCore] Using node binary: ${nodeBinary}")

// Configure all codegen tasks to use the detected node binary
afterEvaluate {
    tasks.withType(com.facebook.react.tasks.GenerateCodegenSchemaTask).configureEach {
        nodeExecutableAndArgs.set([nodeBinary])
    }
    tasks.withType(com.facebook.react.tasks.GenerateCodegenArtifactsTask).configureEach {
        nodeExecutableAndArgs.set([nodeBinary])
    }
}

def getExtOrIntegerDefault(name) {
    if (rootProject.ext.has(name)) {
        return rootProject.ext.get(name)
    } else if (project.properties.containsKey('RunAnywhereCore_' + name)) {
        return (project.properties['RunAnywhereCore_' + name]).toInteger()
    }
    def defaults = [
        'compileSdkVersion': 36,
        'minSdkVersion': 24,
        'targetSdkVersion': 36
    ]
    return defaults[name] ?: 36
}

// =============================================================================
// Version Constants (MUST match Swift Package.swift and iOS Podspec)
// RACommons ONLY - no backend binaries
// =============================================================================
def commonsVersion = "0.1.4"

// =============================================================================
// Binary Source - RACommons from runanywhere-sdks
// =============================================================================
def githubOrg = "RunanywhereAI"
def commonsRepo = "runanywhere-sdks"

// =============================================================================
// Local native source
// =============================================================================
def useLocalBuild = project.findProperty("runanywhere.useLocalNatives")?.toBoolean() ?: false

// Native libraries directory
def jniLibsDir = file("src/main/jniLibs")
def downloadedLibsDir = file("build/downloaded-libs")
def includeDir = file("src/main/include")

// Local runanywhere-commons path (for local builds)
def runAnywhereCommonsDir = file("../../../../runanywhere-commons")

def androidNdkHomeForRuntime() {
    def explicitNdk = System.getenv("ANDROID_NDK_HOME") ?: System.getenv("NDK_HOME")
    if (explicitNdk) {
        return file(explicitNdk)
    }

    def androidSdk = System.getenv("ANDROID_HOME") ?:
        System.getenv("ANDROID_SDK_ROOT") ?:
        "${System.getProperty('user.home')}/Library/Android/sdk"
    def ndkVersion = rootProject.ext.has("ndkVersion") ? rootProject.ext.ndkVersion : "27.3.13750724"
    return file("${androidSdk}/ndk/${ndkVersion}")
}

def androidNdkHostTag() {
    def osName = System.getProperty("os.name").toLowerCase(Locale.ROOT)
    if (osName.contains("mac")) return "darwin-x86_64"
    if (osName.contains("linux")) return "linux-x86_64"
    throw new GradleException("Unsupported host for Android NDK runtime lookup: ${System.getProperty('os.name')}")
}

def androidNdkTripleForAbi(String abi) {
    switch (abi) {
        case 'arm64-v8a': return 'aarch64-linux-android'
        case 'armeabi-v7a': return 'arm-linux-androideabi'
        case 'x86_64': return 'x86_64-linux-android'
        default: throw new GradleException("Unsupported Android ABI for libc++ runtime lookup: ${abi}")
    }
}

def androidNdkOmpArchForAbi(String abi) {
    switch (abi) {
        case 'arm64-v8a': return 'aarch64'
        case 'armeabi-v7a': return 'arm'
        case 'x86_64': return 'x86_64'
        default: throw new GradleException("Unsupported Android ABI for libomp runtime lookup: ${abi}")
    }
}

def latestAndroidClangDir(File prebuiltDir) {
    def clangRoot = new File(prebuiltDir, "lib/clang")
    def clangDirs = clangRoot.listFiles()?.findAll { it.isDirectory() }?.sort { a, b -> a.name <=> b.name }
    if (!clangDirs) {
        throw new GradleException("No Clang runtime directory found under ${clangRoot}")
    }
    return clangDirs.last()
}

def syncAndroidNdkRuntimeLibs(File outputDir, boolean includeLibcxx, boolean includeLibomp) {
    def ndkHome = androidNdkHomeForRuntime()
    def prebuiltDir = new File(ndkHome, "toolchains/llvm/prebuilt/${androidNdkHostTag()}")
    if (!prebuiltDir.isDirectory()) {
        throw new GradleException("Android NDK prebuilt directory not found: ${prebuiltDir}")
    }

    def clangDir = includeLibomp ? latestAndroidClangDir(prebuiltDir) : null
    ['arm64-v8a', 'armeabi-v7a', 'x86_64'].each { abi ->
        def abiDir = new File(outputDir, abi)
        def hasNativeLibs = abiDir.isDirectory() && abiDir.listFiles()?.any { it.name.endsWith(".so") }
        if (!hasNativeLibs) return

        if (includeLibcxx) {
            def libcxx = new File(prebuiltDir, "sysroot/usr/lib/${androidNdkTripleForAbi(abi)}/libc++_shared.so")
            if (!libcxx.isFile()) throw new GradleException("libc++_shared.so not found for ${abi} at ${libcxx}")
            copy { from libcxx; into abiDir }
        }

        if (includeLibomp) {
            def libomp = new File(clangDir, "lib/linux/${androidNdkOmpArchForAbi(abi)}/libomp.so")
            if (!libomp.isFile()) throw new GradleException("libomp.so not found for ${abi} at ${libomp}")
            copy { from libomp; into abiDir }
        }
    }
}

android {
    namespace = "com.margelo.nitro.runanywhere.core"
    ndkVersion = rootProject.ext.has("ndkVersion") ? rootProject.ext.ndkVersion : "27.3.13750724"

    compileSdkVersion getExtOrIntegerDefault('compileSdkVersion')

    defaultConfig {
        minSdkVersion getExtOrIntegerDefault('minSdkVersion')
        targetSdkVersion getExtOrIntegerDefault('targetSdkVersion')
        consumerProguardFiles("consumer-rules.pro")

        ndk {
            abiFilters(*reactNativeArchitectures())
        }

        externalNativeBuild {
            cmake {
                cppFlags "-frtti -fexceptions -Wall -fstack-protector-all"
                arguments "-DANDROID_STL=c++_shared",
                          // Fix NitroModules prefab path - use app's build directory
                          "-DREACT_NATIVE_NITRO_BUILD_DIR=${rootProject.buildDir}"
                abiFilters(*reactNativeArchitectures())
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version = "3.30.5"
        }
    }

    packagingOptions {
        excludes = [
            "META-INF",
            "META-INF/**"
        ]
        pickFirsts = [
            "**/libc++_shared.so",
            "**/libjsi.so",
            "**/libfbjni.so",
            "**/libfolly_runtime.so",
            "**/librac_commons.so",
            "**/librunanywhere_jni.so"
        ]
    }

    buildFeatures {
        buildConfig = true
        prefab = true
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    lint {
        disable 'GradleCompatible'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main {
            java.srcDirs += [
                "generated/java",
                "generated/jni"
            ]

            if (useLocalBuild) {
                def commonsDistDir = new File(runAnywhereCommonsDir, "dist/android")
                if (commonsDistDir.exists()) {
                    jniLibs.srcDirs = [commonsDistDir]
                    logger.lifecycle("[RunAnywhereCore] Using LOCAL native libraries from: $commonsDistDir")
                } else {
                    jniLibs.srcDirs = [jniLibsDir]
                    logger.lifecycle("[RunAnywhereCore] Using staged LOCAL native libraries from: $jniLibsDir")
                }
            } else {
                jniLibs.srcDirs = [jniLibsDir]
            }
        }
    }
}

// =============================================================================
// Download Native Libraries (RACommons ONLY)
// Backend modules (LlamaCPP, ONNX) are downloaded by their respective packages
// =============================================================================

task downloadNativeLibs {
    description = "Downloads RACommons from GitHub releases"
    group = "build setup"

    def versionFile = file("${jniLibsDir}/.version")
    def expectedVersion = commonsVersion

    outputs.dir(jniLibsDir)
    outputs.upToDateWhen {
        versionFile.exists() && versionFile.text.trim() == expectedVersion
    }

    doLast {
        if (useLocalBuild) {
            logger.lifecycle("[RunAnywhereCore] Skipping download - using local build mode")
            return
        }

        fileTree(dir: jniLibsDir, include: "**/libc++_shared.so").files.each { staleStdlib ->
            if (staleStdlib.delete()) {
                logger.lifecycle("[RunAnywhereCore] Removed bundled libc++_shared.so: ${staleStdlib}")
            }
        }

        // Check if libs are already bundled for ALL requested ABIs (npm install case)
        def requestedAbis = reactNativeArchitectures()
        def allAbisBundled = requestedAbis.every { abi ->
            def abiDir = file("${jniLibsDir}/${abi}")
            def libs = abiDir.exists() ? abiDir.listFiles()?.findAll { it.name.endsWith(".so") } : []
            return libs?.size() > 0
        }
        if (allAbisBundled) {
            logger.lifecycle("[RunAnywhereCore] ✅ Using bundled native libraries from npm package for ABIs: ${requestedAbis.join(', ')}")
            return
        }
        // Check if at least arm64-v8a is bundled (partial bundle - need to download missing ABIs)
        def arm64Dir = file("${jniLibsDir}/arm64-v8a")
        def arm64Bundled = arm64Dir.exists() && arm64Dir.listFiles()?.any { it.name.endsWith(".so") }
        if (arm64Bundled) {
            def missingAbis = requestedAbis.findAll { abi ->
                def abiDir = file("${jniLibsDir}/${abi}")
                def libs = abiDir.exists() ? abiDir.listFiles()?.findAll { it.name.endsWith(".so") } : []
                return !libs || libs.size() == 0
            }
            if (missingAbis.size() > 0) {
                logger.lifecycle("[RunAnywhereCore] ⚠️ Bundled libs found for arm64-v8a but missing for: ${missingAbis.join(', ')}")
                logger.lifecycle("[RunAnywhereCore] Attempting to download missing ABIs from GitHub releases...")
                // Try to download and extract only missing ABIs (don't delete existing bundled libs)
                try {
                    def commonsUrl = "https://github.com/${githubOrg}/${commonsRepo}/releases/download/commons-v${commonsVersion}/RACommons-android-v${commonsVersion}.zip"
                    def tempZip = file("${downloadedLibsDir}/RACommons-supplement.zip")
                    downloadedLibsDir.mkdirs()
                    new URL(commonsUrl).withInputStream { input ->
                        tempZip.withOutputStream { output -> output << input }
                    }
                    copy {
                        from zipTree(tempZip)
                        into jniLibsDir
                        exclude "**/libc++_shared.so"
                        eachFile { fileCopyDetails ->
                            def pathString = fileCopyDetails.relativePath.pathString
                            if (pathString.startsWith("jniLibs/") && pathString.endsWith(".so")) {
                                def newPath = pathString.replaceFirst("^jniLibs/", "")
                                fileCopyDetails.relativePath = new RelativePath(true, newPath.split("/"))
                            } else if (!pathString.endsWith(".so")) {
                                fileCopyDetails.exclude()
                            }
                        }
                        includeEmptyDirs = false
                    }
                    tempZip.delete()
                    logger.lifecycle("[RunAnywhereCore] ✅ Downloaded missing ABIs successfully")
                } catch (Exception e) {
                    logger.warn("[RunAnywhereCore] ⚠️ Could not download missing ABIs: ${e.message}")
                    logger.warn("[RunAnywhereCore] Building with available ABIs only (arm64-v8a)")
                }
            }
            return
        }

        def currentVersion = versionFile.exists() ? versionFile.text.trim() : ""
        if (currentVersion == expectedVersion) {
            logger.lifecycle("[RunAnywhereCore] RACommons version $expectedVersion already downloaded")
            return
        }

        logger.lifecycle("[RunAnywhereCore] Downloading RACommons...")
        logger.lifecycle("  Commons Version: $commonsVersion")

        downloadedLibsDir.mkdirs()
        jniLibsDir.deleteDir()
        jniLibsDir.mkdirs()
        includeDir.mkdirs()

        // =============================================================================
        // Download RACommons from runanywhere-sdks
        // =============================================================================
        def commonsUrl = "https://github.com/${githubOrg}/${commonsRepo}/releases/download/commons-v${commonsVersion}/RACommons-android-v${commonsVersion}.zip"
        def commonsZip = file("${downloadedLibsDir}/RACommons.zip")

        logger.lifecycle("\n📦 Downloading RACommons...")
        logger.lifecycle("   URL: $commonsUrl")

        try {
            new URL(commonsUrl).withInputStream { input ->
                commonsZip.withOutputStream { output ->
                    output << input
                }
            }
            logger.lifecycle("   Downloaded: ${commonsZip.length() / 1024}KB")

            // Extract and flatten the archive structure
            // Archive structure: jniLibs/arm64-v8a/*.so
            // Target structure: arm64-v8a/*.so (directly in jniLibsDir)
            copy {
                from zipTree(commonsZip)
                into jniLibsDir
                // IMPORTANT: Exclude libc++_shared.so - React Native provides its own
                // Using a different version causes ABI compatibility issues
                exclude "**/libc++_shared.so"
                eachFile { fileCopyDetails ->
                    def pathString = fileCopyDetails.relativePath.pathString
                    // Handle jniLibs/ABI/*.so structure -> flatten to ABI/*.so
                    if (pathString.startsWith("jniLibs/") && pathString.endsWith(".so")) {
                        def newPath = pathString.replaceFirst("^jniLibs/", "")
                        fileCopyDetails.relativePath = new RelativePath(true, newPath.split("/"))
                    } else if (pathString.endsWith(".so")) {
                        // Keep .so files as-is if already in correct structure
                    } else {
                        // Exclude non-so files from jniLibs
                        if (!pathString.contains("include/")) {
                            fileCopyDetails.exclude()
                        }
                    }
                }
                includeEmptyDirs = false
            }

            // Copy headers if present in the archive
            def tempExtract = file("${downloadedLibsDir}/temp-commons")
            tempExtract.deleteDir()
            copy {
                from zipTree(commonsZip)
                into tempExtract
            }
            def headersDir = new File(tempExtract, "include")
            if (headersDir.exists()) {
                copy {
                    from headersDir
                    into includeDir
                }
                logger.lifecycle("   ✅ RACommons headers installed")
            }
            // Also check for nested jniLibs/include structure
            def nestedHeadersDir = new File(tempExtract, "jniLibs/include")
            if (nestedHeadersDir.exists()) {
                copy {
                    from nestedHeadersDir
                    into includeDir
                }
                logger.lifecycle("   ✅ RACommons headers installed (from nested path)")
            }
            tempExtract.deleteDir()

            logger.lifecycle("   ✅ RACommons installed")
        } catch (Exception e) {
            logger.error("❌ Failed to download RACommons: ${e.message}")
            throw new GradleException("Failed to download RACommons", e)
        }

        // =============================================================================
        // List installed files
        // =============================================================================
        logger.lifecycle("\n📋 Installed native libraries:")
        jniLibsDir.listFiles()?.findAll { it.isDirectory() }?.each { abiDir ->
            logger.lifecycle("  ${abiDir.name}/")
            abiDir.listFiles()?.findAll { it.name.endsWith(".so") }?.sort()?.each { soFile ->
                logger.lifecycle("    ${soFile.name} (${soFile.length() / 1024}KB)")
            }
        }

        if (includeDir.exists() && includeDir.listFiles()?.size() > 0) {
            logger.lifecycle("\n📋 Installed headers:")
            includeDir.eachFileRecurse { file ->
                if (file.isFile() && file.name.endsWith(".h")) {
                    logger.lifecycle("  ${file.relativePath(includeDir)}")
                }
            }
        }

        versionFile.text = expectedVersion
        logger.lifecycle("\n✅ RACommons version $expectedVersion installed")
    }
}

task syncAndroidRuntimeLibs {
    description = "Stages 16 KB-aligned Android NDK runtime libraries"
    group = "build setup"

    if (!useLocalBuild) {
        dependsOn downloadNativeLibs
    }

    doLast {
        syncAndroidNdkRuntimeLibs(jniLibsDir, true, true)
        logger.lifecycle("[RunAnywhereCore] Synced 16 KB-aligned Android NDK runtime libs into ${jniLibsDir}")
    }
}

if (!useLocalBuild) {
    preBuild.dependsOn downloadNativeLibs

    afterEvaluate {
        tasks.matching {
            it.name.contains("generateCodegen") || it.name.contains("Codegen")
        }.configureEach {
            mustRunAfter downloadNativeLibs
        }
    }
}

preBuild.dependsOn syncAndroidRuntimeLibs

// NOTE: cleanNativeLibs is NOT attached to clean task because npm-bundled libs should persist
// Only use this task manually when needed during development
task cleanNativeLibs(type: Delete) {
    description = "Removes downloaded native libraries (use manually, not during normal clean)"
    group = "build"
    delete downloadedLibsDir
    delete includeDir
    // DO NOT delete jniLibsDir - it contains npm-bundled libraries
}

// DO NOT add: clean.dependsOn cleanNativeLibs
// This would delete bundled .so files from the npm package

repositories {
    mavenCentral()
    google()
}

dependencies {
    implementation "com.facebook.react:react-android"
    implementation project(":react-native-nitro-modules")

    // OkHttp for the platform HTTP transport.
    // Routes rac_http_request_* through the system trust store + HTTP/2
    // + proxies + NetworkSecurityConfig instead of libcurl. React Native
    // pulls OkHttp transitively but does NOT expose it to library modules,
    // so we declare it explicitly.
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
}
