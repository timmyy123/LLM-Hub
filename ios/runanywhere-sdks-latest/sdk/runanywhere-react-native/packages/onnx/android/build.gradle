// =============================================================================
// Node Binary Detection for Android Studio Compatibility
// Android Studio doesn't inherit terminal PATH, so we need to find node explicitly
// =============================================================================
def findNodeBinary() {
    // Check local.properties first (user can override)
    def localProperties = new Properties()
    def localPropertiesFile = rootProject.file("local.properties")
    if (localPropertiesFile.exists()) {
        localPropertiesFile.withInputStream { localProperties.load(it) }
        def nodePath = localProperties.getProperty("node.path")
        if (nodePath && new File(nodePath).exists()) {
            return nodePath
        }
    }

    // Honor the active toolchain before probing machine-global installations.
    def configuredNode = System.getenv("NODE_BINARY")
    if (configuredNode && new File(configuredNode).canExecute()) {
        return configuredNode
    }
    def pathNode = System.getenv("PATH")
        ?.split(File.pathSeparator)
        ?.collect { new File(it, "node") }
        ?.find { it.canExecute() }
    if (pathNode) {
        return pathNode.canonicalPath
    }

    // Check common node installation paths
    def homeDir = System.getProperty("user.home")
    def nodePaths = [
        "/opt/homebrew/bin/node",                    // macOS ARM (Apple Silicon)
        "/usr/local/bin/node",                       // macOS Intel / Linux
        "/usr/bin/node",                             // Linux system
        "${homeDir}/.nvm/current/bin/node",          // nvm
        "${homeDir}/.volta/bin/node",                // volta
        "${homeDir}/.asdf/shims/node"                // asdf
    ]
    for (path in nodePaths) {
        if (new File(path).exists()) {
            return path
        }
    }

    // Fallback to 'node' (works if PATH is set correctly in terminal builds)
    return "node"
}

def getExtOrDefault(name) {
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['RunAnywhereONNX_' + name]
}

// Public packages ship the same three Android ABIs as the canonical native bundle.
// Can be overridden via gradle.properties: reactNativeArchitectures=arm64-v8a
def reactNativeArchitectures() {
    def value = rootProject.hasProperty("reactNativeArchitectures")
        ? rootProject.property("reactNativeArchitectures")
        : null
    return value ? value.split(",").collect { it.trim() } : ["arm64-v8a", "armeabi-v7a", "x86_64"]
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply from: '../nitrogen/generated/android/runanywhereonnx+autolinking.gradle'
apply plugin: 'com.facebook.react'

// Configure node path for Android Studio builds
// Set the react extension's nodeExecutableAndArgs after plugin is applied
def nodeBinary = findNodeBinary()
logger.lifecycle("[RunAnywhereONNX] Using node binary: ${nodeBinary}")

// Configure all codegen tasks to use the detected node binary
afterEvaluate {
    tasks.withType(com.facebook.react.tasks.GenerateCodegenSchemaTask).configureEach {
        nodeExecutableAndArgs.set([nodeBinary])
    }
    tasks.withType(com.facebook.react.tasks.GenerateCodegenArtifactsTask).configureEach {
        nodeExecutableAndArgs.set([nodeBinary])
    }
}

def getExtOrIntegerDefault(name) {
    if (rootProject.ext.has(name)) {
        return rootProject.ext.get(name)
    } else if (project.properties.containsKey('RunAnywhereONNX_' + name)) {
        return (project.properties['RunAnywhereONNX_' + name]).toInteger()
    }
    def defaults = [
        'compileSdkVersion': 36,
        'minSdkVersion': 24,
        'targetSdkVersion': 36
    ]
    return defaults[name] ?: 36
}

// =============================================================================
// Version Constants — read from sdk/runanywhere-commons/VERSION (single source of truth)
// RABackendONNX from runanywhere-sdks
// =============================================================================
def coreVersionFile = file("${projectDir.canonicalPath}/../../../../runanywhere-commons/VERSION")
def coreVersion = coreVersionFile.exists() ? coreVersionFile.text.trim() : "0.20.9"

// =============================================================================
// Binary Source - RABackendONNX from runanywhere-sdks
// =============================================================================
def githubOrg = "RunanywhereAI"
def coreRepo = "runanywhere-sdks"

// =============================================================================
// Local native source
// =============================================================================
def useLocalBuild = project.findProperty("runanywhere.useLocalNatives")?.toBoolean() ?: false

// Native libraries directory
def jniLibsDir = file("src/main/jniLibs")
def downloadedLibsDir = file("build/downloaded-libs")
def expectedOnnxNativeLibraries = [
    "libonnxruntime.so",
    "librac_backend_onnx.so",
    "librac_backend_onnx_jni.so",
    "librac_backend_sherpa.so",
    "librunanywhere_onnx.so",
    "librunanywhere_sherpa.so",
    "libsherpa-onnx-c-api.so",
    "libsherpa-onnx-jni.so"
] as Set

def onnxNativeInventory = { File rootDir, String abi ->
    def abiDir = new File(rootDir, abi)
    return abiDir.isDirectory()
        ? abiDir.listFiles()
            ?.findAll { it.name.endsWith(".so") && it.name != "libc++_shared.so" }
            ?.collect { it.name }
            ?.toSet() ?: [] as Set
        : [] as Set
}

def hasExactOnnxNativeInventory = { File rootDir, String abi ->
    onnxNativeInventory(rootDir, abi) == expectedOnnxNativeLibraries
}

def validateOnnxNativeInventory = { File rootDir, String abi ->
    def actual = onnxNativeInventory(rootDir, abi)
    if (actual != expectedOnnxNativeLibraries) {
        throw new GradleException(
            "ONNX native inventory mismatch for ${abi}: " +
                "missing=${(expectedOnnxNativeLibraries - actual).sort()}, " +
                "unexpected=${(actual - expectedOnnxNativeLibraries).sort()}"
        )
    }
}

def androidNdkHomeForRuntime() {
    def explicitNdk = System.getenv("ANDROID_NDK_HOME") ?: System.getenv("NDK_HOME")
    if (explicitNdk) {
        return file(explicitNdk)
    }

    def androidSdk = System.getenv("ANDROID_HOME") ?:
        System.getenv("ANDROID_SDK_ROOT") ?:
        "${System.getProperty('user.home')}/Library/Android/sdk"
    def ndkVersion = rootProject.ext.has("ndkVersion") ? rootProject.ext.ndkVersion : "27.3.13750724"
    return file("${androidSdk}/ndk/${ndkVersion}")
}

def androidNdkHostTag() {
    def osName = System.getProperty("os.name").toLowerCase(Locale.ROOT)
    if (osName.contains("mac")) return "darwin-x86_64"
    if (osName.contains("linux")) return "linux-x86_64"
    throw new GradleException("Unsupported host for Android NDK runtime lookup: ${System.getProperty('os.name')}")
}

def androidNdkTripleForAbi(String abi) {
    switch (abi) {
        case 'arm64-v8a': return 'aarch64-linux-android'
        case 'armeabi-v7a': return 'arm-linux-androideabi'
        case 'x86_64': return 'x86_64-linux-android'
        default: throw new GradleException("Unsupported Android ABI for libc++ runtime lookup: ${abi}")
    }
}

def syncAndroidNdkRuntimeLibs(File outputDir) {
    def ndkHome = androidNdkHomeForRuntime()
    def prebuiltDir = new File(ndkHome, "toolchains/llvm/prebuilt/${androidNdkHostTag()}")
    if (!prebuiltDir.isDirectory()) {
        throw new GradleException("Android NDK prebuilt directory not found: ${prebuiltDir}")
    }

    ['arm64-v8a', 'armeabi-v7a', 'x86_64'].each { abi ->
        def abiDir = new File(outputDir, abi)
        def hasNativeLibs = abiDir.isDirectory() && abiDir.listFiles()?.any { it.name.endsWith(".so") }
        if (!hasNativeLibs) return

        def libcxx = new File(prebuiltDir, "sysroot/usr/lib/${androidNdkTripleForAbi(abi)}/libc++_shared.so")
        if (!libcxx.isFile()) throw new GradleException("libc++_shared.so not found for ${abi} at ${libcxx}")
        copy { from libcxx; into abiDir }
    }
}

android {
    namespace = "com.margelo.nitro.runanywhere.onnx"
    ndkVersion = rootProject.ext.has("ndkVersion") ? rootProject.ext.ndkVersion : "27.3.13750724"

    compileSdkVersion getExtOrIntegerDefault('compileSdkVersion')

    defaultConfig {
        minSdkVersion getExtOrIntegerDefault('minSdkVersion')
        targetSdkVersion getExtOrIntegerDefault('targetSdkVersion')

        ndk {
            abiFilters(*reactNativeArchitectures())
        }

        externalNativeBuild {
            cmake {
                cppFlags "-frtti -fexceptions -Wall -fstack-protector-all"
                arguments "-DANDROID_STL=c++_shared",
                          // Fix NitroModules prefab path - use app's build directory
                          "-DREACT_NATIVE_NITRO_BUILD_DIR=${rootProject.buildDir}"
                abiFilters(*reactNativeArchitectures())
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version = "3.30.5"
        }
    }

    packagingOptions {
        excludes = [
            "META-INF",
            "META-INF/**",
            // Exclude librac_commons.so from this module's packaging.
            // The core package (@runanywhere/core) is the single authoritative source
            // for librac_commons.so. If this module also packages it, Gradle's native
            // lib merge may pick a stale version, causing UnsatisfiedLinkError crashes.
            "**/librac_commons.so"
        ]
        pickFirsts = [
            "**/libc++_shared.so",
            "**/libjsi.so",
            "**/libfbjni.so",
            "**/libfolly_runtime.so"
        ]
    }

    buildFeatures {
        buildConfig = true
        prefab = true
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    lint {
        disable 'GradleCompatible'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main {
            java.srcDirs += [
                "generated/java",
                "generated/jni"
            ]
            jniLibs.srcDirs = [jniLibsDir]
        }
    }
}

// =============================================================================
// Download Native Libraries (RABackendONNX + ONNX Runtime)
// =============================================================================

task downloadNativeLibs {
    description = "Downloads RABackendONNX and ONNX Runtime from GitHub releases"
    group = "build setup"

    def versionFile = file("${jniLibsDir}/.version")
    def expectedVersion = coreVersion

    outputs.dir(jniLibsDir)
    outputs.upToDateWhen {
        versionFile.exists() &&
            versionFile.text.trim() == expectedVersion &&
            reactNativeArchitectures().every { abi -> hasExactOnnxNativeInventory(jniLibsDir, abi) }
    }

    doLast {
        def requestedAbis = reactNativeArchitectures()

        if (useLocalBuild) {
            requestedAbis.each { abi -> validateOnnxNativeInventory(jniLibsDir, abi) }
            logger.lifecycle("[RunAnywhereONNX] Skipping download - using local build mode")
            return
        }

        fileTree(dir: jniLibsDir, include: "**/libc++_shared.so").files.each { staleStdlib ->
            if (staleStdlib.delete()) {
                logger.lifecycle("[RunAnywhereONNX] Removed bundled libc++_shared.so: ${staleStdlib}")
            }
        }

        // Check if the exact native contract is already bundled for every requested ABI.
        def allAbisBundled = requestedAbis.every { abi -> hasExactOnnxNativeInventory(jniLibsDir, abi) }
        if (allAbisBundled) {
            logger.lifecycle("[RunAnywhereONNX] ✅ Using bundled native libraries from npm package for ABIs: ${requestedAbis.join(', ')}")
            return
        }
        // A valid arm64 bundle may be supplemented with other requested ABIs.
        def arm64Bundled = hasExactOnnxNativeInventory(jniLibsDir, "arm64-v8a")
        if (arm64Bundled) {
            def missingAbis = requestedAbis.findAll { abi -> !hasExactOnnxNativeInventory(jniLibsDir, abi) }
            if (missingAbis.size() > 0) {
                logger.lifecycle("[RunAnywhereONNX] ⚠️ Bundled libs found for arm64-v8a but missing for: ${missingAbis.join(', ')}")
                logger.lifecycle("[RunAnywhereONNX] Attempting to download missing ABIs from GitHub releases...")
                try {
                    def onnxUrl = "https://github.com/${githubOrg}/${coreRepo}/releases/download/core-v${coreVersion}/RABackendONNX-android-v${coreVersion}.zip"
                    def tempZip = file("${downloadedLibsDir}/RABackendONNX-supplement.zip")
                    downloadedLibsDir.mkdirs()
                    new URL(onnxUrl).withInputStream { input ->
                        tempZip.withOutputStream { output -> output << input }
                    }
                    copy {
                        from zipTree(tempZip)
                        into jniLibsDir
                        exclude "**/libc++_shared.so"
                        // Exclude librac_commons.so - the core package (@runanywhere/core) is the
                        // authoritative source. Including it here risks a stale version winning the
                        // Gradle native lib merge, causing UnsatisfiedLinkError crashes at runtime.
                        exclude "**/librac_commons.so"
                        eachFile { fileCopyDetails ->
                            def pathString = fileCopyDetails.relativePath.pathString
                            def match = pathString =~ /.*\/(arm64-v8a|armeabi-v7a|x86|x86_64)\/(.+\.so)$/
                            if (match) {
                                def abi = match[0][1]
                                def filename = match[0][2]
                                fileCopyDetails.relativePath = new RelativePath(true, abi, filename)
                            } else if (!pathString.endsWith(".so")) {
                                fileCopyDetails.exclude()
                            }
                        }
                        includeEmptyDirs = false
                    }
                    tempZip.delete()
                    requestedAbis.each { abi -> validateOnnxNativeInventory(jniLibsDir, abi) }
                    versionFile.text = expectedVersion
                    logger.lifecycle("[RunAnywhereONNX] ✅ Downloaded missing ABIs successfully")
                } catch (Exception e) {
                    throw new GradleException("Failed to download or validate requested ONNX ABIs", e)
                }
            }
            return
        }

        logger.lifecycle("[RunAnywhereONNX] Downloading RABackendONNX...")
        logger.lifecycle("  Core Version: $coreVersion")

        downloadedLibsDir.mkdirs()
        jniLibsDir.deleteDir()
        jniLibsDir.mkdirs()

        // =============================================================================
        // Download RABackendONNX from runanywhere-sdks
        // =============================================================================
        def onnxUrl = "https://github.com/${githubOrg}/${coreRepo}/releases/download/core-v${coreVersion}/RABackendONNX-android-v${coreVersion}.zip"
        def onnxZip = file("${downloadedLibsDir}/RABackendONNX.zip")

        logger.lifecycle("\n📦 Downloading RABackendONNX...")
        logger.lifecycle("   URL: $onnxUrl")

        try {
            new URL(onnxUrl).withInputStream { input ->
                onnxZip.withOutputStream { output ->
                    output << input
                }
            }
            logger.lifecycle("   Downloaded: ${onnxZip.length() / 1024}KB")

            // Extract and flatten the archive structure
            // Archive structure: RABackendONNX-android-vX.Y.Z/onnx/arm64-v8a/*.so
            // Target structure: arm64-v8a/*.so
            copy {
                from zipTree(onnxZip)
                into jniLibsDir
                // IMPORTANT: Exclude libc++_shared.so - React Native provides its own
                // Using a different version causes ABI compatibility issues
                exclude "**/libc++_shared.so"
                // Exclude librac_commons.so - the core package (@runanywhere/core) is the
                // authoritative source. Including it here risks a stale version winning the
                // Gradle native lib merge, causing UnsatisfiedLinkError crashes at runtime.
                exclude "**/librac_commons.so"
                eachFile { fileCopyDetails ->
                    def pathString = fileCopyDetails.relativePath.pathString
                    // Handle RABackendONNX-android-vX.Y.Z/onnx/ABI/*.so structure
                    def match = pathString =~ /.*\/(arm64-v8a|armeabi-v7a|x86|x86_64)\/(.+\.so)$/
                    if (match) {
                        def abi = match[0][1]
                        def filename = match[0][2]
                        fileCopyDetails.relativePath = new RelativePath(true, abi, filename)
                    } else if (pathString.endsWith(".so")) {
                        // Fallback: just use the last two segments (abi/file.so)
                        def segments = pathString.split("/")
                        if (segments.length >= 2) {
                            fileCopyDetails.relativePath = new RelativePath(true, segments[-2], segments[-1])
                        }
                    } else {
                        // Exclude non-so files
                        fileCopyDetails.exclude()
                    }
                }
                includeEmptyDirs = false
            }

            logger.lifecycle("   ✅ RABackendONNX native libraries installed")

            // Extract header files
            def includeDir = file("include")
            includeDir.deleteDir()
            includeDir.mkdirs()

            copy {
                from zipTree(onnxZip)
                into includeDir
                eachFile { fileCopyDetails ->
                    def pathString = fileCopyDetails.relativePath.pathString
                    // Handle RABackendONNX-android-vX.Y.Z/include/*.h structure
                    if (pathString.contains("/include/") && pathString.endsWith(".h")) {
                        def filename = pathString.substring(pathString.lastIndexOf("/") + 1)
                        fileCopyDetails.relativePath = new RelativePath(true, filename)
                    } else {
                        fileCopyDetails.exclude()
                    }
                }
                includeEmptyDirs = false
            }
            logger.lifecycle("   ✅ RABackendONNX headers installed")

            requestedAbis.each { abi -> validateOnnxNativeInventory(jniLibsDir, abi) }

        } catch (Exception e) {
            logger.error("❌ Failed to download RABackendONNX: ${e.message}")
            throw new GradleException("Failed to download RABackendONNX", e)
        }

        // =============================================================================
        // List installed files
        // =============================================================================
        logger.lifecycle("\n📋 Installed native libraries:")
        jniLibsDir.listFiles()?.findAll { it.isDirectory() }?.each { abiDir ->
            logger.lifecycle("  ${abiDir.name}/")
            abiDir.listFiles()?.findAll { it.name.endsWith(".so") }?.sort()?.each { soFile ->
                logger.lifecycle("    ${soFile.name} (${soFile.length() / 1024}KB)")
            }
        }

        versionFile.text = expectedVersion
        logger.lifecycle("\n✅ RABackendONNX version $expectedVersion installed")
    }
}

task syncAndroidRuntimeLibs {
    description = "Stages 16 KB-aligned Android NDK libc++"
    group = "build setup"

    if (!useLocalBuild) {
        dependsOn downloadNativeLibs
    }

    doLast {
        syncAndroidNdkRuntimeLibs(jniLibsDir)
        logger.lifecycle("[RunAnywhereONNX] Synced 16 KB-aligned Android NDK libc++ into ${jniLibsDir}")
    }
}

if (!useLocalBuild) {
    preBuild.dependsOn downloadNativeLibs

    afterEvaluate {
        tasks.matching {
            it.name.contains("generateCodegen") || it.name.contains("Codegen")
        }.configureEach {
            mustRunAfter downloadNativeLibs
        }
    }
}

preBuild.dependsOn syncAndroidRuntimeLibs

// NOTE: cleanNativeLibs is NOT attached to clean task because npm-bundled libs should persist
// Only use this task manually when needed during development
task cleanNativeLibs(type: Delete) {
    description = "Removes downloaded native libraries (use manually, not during normal clean)"
    group = "build"
    delete downloadedLibsDir
    // DO NOT delete jniLibsDir - it contains npm-bundled libraries
}

// DO NOT add: clean.dependsOn cleanNativeLibs
// This would delete bundled .so files from the npm package

repositories {
    mavenCentral()
    google()
}

dependencies {
    implementation "com.facebook.react:react-android"
    implementation project(":react-native-nitro-modules")
    implementation project(":runanywhere_core")
}
