name: Auto-Tag Release

# =============================================================================
# Label-driven release triggering.
#
# When a PR is merged to main with one of these labels:
#   release:patch   — v0.19.7 → v0.19.8
#   release:minor   — v0.19.7 → v0.20.0
#   release:major   — v0.19.7 → v1.0.0
#
# this workflow:
#   1. Reads the pre-merge version from the PR base and the reviewed version
#      from merged main.
#   2. Verifies the reviewed version is the exact label-selected semver bump.
#   3. Runs scripts/release/sync-versions.sh as a read-only coherence check.
#   4. Tags the exact reviewed merge commit and explicitly dispatches
#      release.yml to build the draft release.
#
# If no release label is present, the workflow is a no-op. Merges without a label
# just land the code on main as normal — releases are explicit opt-in.
#
# Alternative (manual): engineer can still run this flow manually:
#   scripts/release/sync-versions.sh 0.20.0
#   git tag v0.20.0 && git push origin v0.20.0
# Both paths converge on release.yml.
# =============================================================================

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  actions: write        # needed to dispatch release.yml after tagging
  contents: write       # needed to push the reviewed release tag
  pull-requests: write  # needed for gh pr comment on the merged PR

jobs:
  auto-tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Detect release label on merged PR
        id: label
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          # Extract just the label names
          NAMES=$(echo "$PR_LABELS" | jq -r '.[].name')
          echo "PR labels: $NAMES"

          BUMP=""
          RELEASE_LABEL_COUNT=0
          for name in $NAMES; do
            case "$name" in
              release:patch) BUMP="patch"; RELEASE_LABEL_COUNT=$((RELEASE_LABEL_COUNT + 1)) ;;
              release:minor) BUMP="minor"; RELEASE_LABEL_COUNT=$((RELEASE_LABEL_COUNT + 1)) ;;
              release:major) BUMP="major"; RELEASE_LABEL_COUNT=$((RELEASE_LABEL_COUNT + 1)) ;;
            esac
          done

          if [ "$RELEASE_LABEL_COUNT" -gt 1 ]; then
            echo "::error::Merged PR has multiple release:* labels; exactly one is allowed."
            exit 1
          elif [ -z "$BUMP" ]; then
            echo "No release:* label — nothing to do."
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release label found: release:$BUMP"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout the reviewed merge commit
        if: steps.label.outputs.should-release == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify reviewed release version
        if: steps.label.outputs.should-release == 'true'
        id: version
        env:
          BUMP: ${{ steps.label.outputs.bump }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          REVIEWED=$(grep -E '^PROJECT_VERSION=' sdk/runanywhere-commons/VERSIONS | cut -d= -f2 | xargs)
          BEFORE=$(git show "${BASE_SHA}:sdk/runanywhere-commons/VERSIONS" \
            | grep -E '^PROJECT_VERSION=' | cut -d= -f2 | xargs)

          BASE_VERSION="${BEFORE%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          case "$BUMP" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac

          EXPECTED="${MAJOR}.${MINOR}.${PATCH}"
          echo "Pre-merge version: $BEFORE"
          echo "Requested bump:    $BUMP"
          echo "Expected version:  $EXPECTED"
          echo "Reviewed version:  $REVIEWED"
          if [ "$REVIEWED" != "$EXPECTED" ]; then
            echo "::error::release:${BUMP} requires PROJECT_VERSION=${EXPECTED}; merged main contains ${REVIEWED}."
            echo "::error::Run scripts/release/sync-versions.sh ${EXPECTED} in the release PR before merging."
            exit 1
          fi
          echo "new-version=$REVIEWED" >> "$GITHUB_OUTPUT"

      - name: Sanity-check tag doesn't already exist
        if: steps.label.outputs.should-release == 'true'
        id: tag
        env:
          NEW_VERSION: ${{ steps.version.outputs.new-version }}
        run: |
          set -euo pipefail
          if git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            TAG_COMMIT="$(git rev-list -n 1 "v${NEW_VERSION}")"
            REVIEWED_COMMIT="$(git rev-parse HEAD)"
            if [ "$TAG_COMMIT" != "$REVIEWED_COMMIT" ]; then
              echo "::error::Tag v${NEW_VERSION} already points to ${TAG_COMMIT}, not reviewed commit ${REVIEWED_COMMIT}."
              exit 1
            fi
            echo "::notice::Tag v${NEW_VERSION} already points to the reviewed commit; release dispatch can be retried."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run sync-versions.sh
        if: steps.label.outputs.should-release == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new-version }}
        run: |
          set -euo pipefail
          chmod +x scripts/release/sync-versions.sh
          ./scripts/release/sync-versions.sh "${NEW_VERSION}"

      - name: Verify release manifest coherence
        if: steps.label.outputs.should-release == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new-version }}
        run: |
          set -euo pipefail
          # Main's branch protection requires every versioned manifest change
          # to be reviewed in the PR. sync-versions.sh above is therefore a
          # read-only assertion: it must produce no tracked diff after merge.
          status="$(git status --porcelain --untracked-files=all)"
          if [ -n "$status" ]; then
            echo "::error::Merged release manifests are out of sync with reviewed version v${NEW_VERSION}."
            echo "::error::Run scripts/release/sync-versions.sh ${NEW_VERSION}, commit its output, and merge a corrected PR."
            git diff
            printf '%s\n' "$status"
            exit 1
          fi
          echo "::notice::Manifests already bumped to v${NEW_VERSION} in the release PR."

      - name: Push reviewed release tag
        if: steps.label.outputs.should-release == 'true' && steps.tag.outputs.exists != 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new-version }}
        run: |
          set -euo pipefail
          # Tags are not subject to branch protection, so the workflow token can push them.
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
          echo "::notice::Pushed tag v${NEW_VERSION} at reviewed commit $(git rev-parse HEAD)"

      # Pushes made with GITHUB_TOKEN do not trigger another workflow. Dispatch
      # release.yml explicitly at the immutable tag so automatic releases work
      # without a separate PAT and retries can recover after transient failures.
      - name: Dispatch release workflow at tag
        if: steps.label.outputs.should-release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new-version }}
        run: |
          set -euo pipefail
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref "v${NEW_VERSION}" \
            --field "version=${NEW_VERSION}"
          echo "::notice::Dispatched release.yml at v${NEW_VERSION}"

      - name: Comment on merged PR
        if: steps.label.outputs.should-release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          NEW_VERSION: ${{ steps.version.outputs.new-version }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "🚀 Tagged **v${NEW_VERSION}** at the reviewed merge commit and dispatched release.yml. The GitHub Release will be created as a draft; publish it after reviewing the assets."
