name: PR build matrix

# This file replaces the previous 601-line workflow that called per-SDK
# build-*.sh scripts. The canonical entry point is the root
# CMake + presets:
#
#   cmake --preset <preset>
#   cmake --build  --preset <preset>
#   ctest          --preset <preset>     # debug presets only
#
# The wrapper scripts under scripts/build/build-core-*.sh package the artifacts for
# each frontend SDK; per-SDK jobs that need those artifacts call the wrapper
# instead of duplicating cmake calls.

on:
  pull_request:
    branches: [main, dev, "feat/v2-architecture"]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main, dev, "feat/v2-architecture"]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal token surface — PR-triggered workflows run on untrusted fork code;
# restricting to contents:read prevents token abuse via gh CLI calls.
permissions:
  contents: read

jobs:
  # =============================================================================
  # Centralization gates — defend the invariant that toolchain + library
  # pins live in a single source of truth (sdk/runanywhere-commons/VERSIONS,
  # dependencies/versions.json, sdk/runanywhere-flutter/pubspec.yaml, and
  # gradle/libs.versions.toml). Fast-fail before kicking off the SDK matrix.
  # See docs/dependencies/CENTRALIZATION.md.
  # =============================================================================

  centralization:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      # Cheapest gate first — needs only git + bash, no toolchain. Fails the PR
      # if any tracked AGENTS.md is missing its committed CLAUDE.md -> AGENTS.md symlink.
      - name: AGENTS.md / CLAUDE.md symlink check
        run: bash scripts/validation/gates/check_agents_claude_sync.sh
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: node
      - name: TypeScript / Web / RN centralization (syncpack)
        run: bash scripts/validation/gates/check_typescript_centralization.sh
      - name: WASM vendor provenance schema contract
        run: bash scripts/validation/gates/check_wasm_provenance_contract.sh
      - name: Release-train version coherence
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_RELEASE_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          if [ -n "${PR_BASE_SHA}" ]; then
            git fetch --no-tags --depth=1 origin "${PR_BASE_SHA}"
          fi
          bash scripts/validation/gates/check_release_version_coherence.sh
      - name: Flutter dependency centralization
        # Strict by default — drift in ffi / http / protobuf is runtime-critical
        # because these deps lockstep with the C ABI surface. Use STRICT=0 only
        # for short-lived investigations; the workflow should not ship soft.
        env:
          FLUTTER_CENTRALIZATION_STRICT: '1'
        run: bash scripts/validation/gates/check_flutter_centralization.sh
      - name: Gradle / Kotlin centralization
        run: bash scripts/validation/gates/check_gradle_centralization.sh
      - name: Android dependency and build contract tests
        run: |
          set -euo pipefail
          python3 scripts/build/test_validate_qhexrt_prebuilt.py
          python3 scripts/build/test_build_core_android_guards.py
          python3 sdk/runanywhere-commons/scripts/android/test_download_sherpa_onnx.py

  # =============================================================================
  # Native core builds (one job per CMake preset family)
  # =============================================================================

  macos-debug:
    # These CPU-only presets disable GGML_METAL, so validate the native core
    # with the same exact Xcode/Clang pin used by the shipping Apple SDK.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: macos
      - name: Install ninja + protobuf
        run: brew install ninja protobuf
      - name: Configure
        run: cmake --preset macos-debug
      - name: Build
        run: cmake --build --preset macos-debug
      - name: Test
        run: ctest --preset macos-debug

  macos-release:
    # Keep the release compile on the canonical Apple toolchain too. Metal is
    # disabled in this preset; the dedicated rcli lane covers Metal separately.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: macos
      - run: brew install ninja protobuf
      - run: cmake --preset macos-release
      - run: cmake --build --preset macos-release

  linux-debug:
    # Note: we intentionally do NOT apt-install libprotobuf-dev here. Ubuntu
    # 24.04 still only ships protobuf 3.21, which is rejected by our
    # RAC_PROTOBUF_MIN_VERSION=5.0 check, but find_package still registers
    # IMPORTED `protobuf::libprotobuf{,-lite}` targets from the system config
    # before FetchContent_MakeAvailable() can add its own ALIAS, producing
    # "add_library cannot create ALIAS target ... already exists". Skipping
    # the apt install forces the vendored FetchContent path cleanly.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - run: cmake --preset linux-debug
      - run: cmake --build --preset linux-debug
      - run: ctest --preset linux-debug

  linux-asan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - run: cmake --preset linux-asan
      - run: cmake --build --preset linux-asan
      - run: ctest --preset linux-asan

  rcli-macos:
    # rcli desktop CLI — full-backend release build + modelless smoke.
    # This is the one macOS lane that enables GGML_METAL, so it retains the
    # older compatible runner while CPU-only native and SDK lanes use Xcode 26.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - run: brew install ninja protobuf
      - run: cmake --preset rcli-macos-release
      - run: cmake --build --preset rcli-macos-release
      - name: Smoke (modelless)
        run: |
          set -euo pipefail
          RCLI=build/rcli-macos-release/sdk/runanywhere-cli/rcli
          "$RCLI" version
          "$RCLI" backends
          "$RCLI" list --all
          "$RCLI" info --json
      - name: Package smoke
        run: bash sdk/runanywhere-cli/scripts/package-rcli.sh build/rcli-macos-release macos-arm64

  rcli-linux:
    # rcli desktop CLI on Linux — release build, unit tests, modelless smoke.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libcurl4-openssl-dev patchelf
      - name: Sherpa-ONNX prebuilts
        run: ./sdk/runanywhere-commons/scripts/linux/download-sherpa-onnx.sh
      - run: cmake --preset rcli-linux-release -DRAC_BUILD_TESTS=ON
      - run: cmake --build --preset rcli-linux-release
      - name: Unit tests
        run: ctest --test-dir build/rcli-linux-release -R "rcli_unit_tests|desktop_adapter_tests" --output-on-failure
      - name: Smoke (modelless)
        run: |
          set -euo pipefail
          RCLI=build/rcli-linux-release/sdk/runanywhere-cli/rcli
          "$RCLI" version
          "$RCLI" backends
          "$RCLI" list --all
          "$RCLI" info --json
      - name: Package smoke
        run: bash sdk/runanywhere-cli/scripts/package-rcli.sh build/rcli-linux-release linux-x86_64

  wasm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: web
      - name: Configure (WASM)
        run: cmake --preset wasm
      - name: Build (WASM)
        run: cmake --build --preset wasm

  ios-device:
    # MLX audio is linked through mlx-audio-swift, which requires Swift 6.2+.
    # Use the macOS 26 runner line for Xcode 26; only the Metal rcli lane keeps
    # its explicit older-runner compatibility exception.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: ios
      - run: brew install protobuf
      - name: Download vendored ONNX Runtime (iOS xcframework)
        run: bash sdk/runanywhere-commons/scripts/ios/download-onnx.sh
      - name: Download vendored Sherpa-ONNX (iOS xcframework)
        run: bash sdk/runanywhere-commons/scripts/ios/download-sherpa-onnx.sh
      - run: cmake --preset ios-device
      - run: cmake --build --preset ios-device --config Release

  android-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: android
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Download vendored Sherpa-ONNX (Android)
        run: bash sdk/runanywhere-commons/scripts/android/download-sherpa-onnx.sh
      - run: cmake --preset android-arm64
      - run: cmake --build --preset android-arm64

  # =============================================================================
  # Per-SDK frontend builds (call wrapper scripts, which internally drive cmake)
  # =============================================================================

  swift-spm:
    # Builds the Apple MLX Swift runtime, including mlx-audio-swift. This
    # needs Swift 6.2+, so use the macOS 26/Xcode 26 runner line.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: ios
      - run: brew install protobuf
      - name: Download vendored ONNX Runtime (iOS xcframework)
        run: bash sdk/runanywhere-commons/scripts/ios/download-onnx.sh
      - name: Download vendored Sherpa-ONNX (iOS xcframework)
        run: bash sdk/runanywhere-commons/scripts/ios/download-sherpa-onnx.sh
      - name: Build pinned Sherpa/ONNX static inventory (macOS arm64)
        run: bash sdk/runanywhere-commons/scripts/macos/download-sherpa-onnx.sh
      - name: Build XCFramework
        run: ./sdk/runanywhere-swift/scripts/build-core-xcframework.sh
      - name: Build all Swift products and run tests
        env:
          RUNANYWHERE_USE_LOCAL_NATIVES: "1"
        run: |
          set -euo pipefail
          swift build --build-tests --jobs 2
          swift test --skip-build --jobs 2
      - name: SwiftLint (SDK, strict)
        working-directory: sdk/runanywhere-swift
        run: |
          set -euo pipefail
          command -v swiftlint >/dev/null 2>&1 || brew install swiftlint
          swiftlint lint --strict --quiet
      # Periphery remains advisory until the runner image ships it and the
      # repository has a checked-in, reproducible scan configuration.
      - name: Periphery unused-code scan (advisory)
        continue-on-error: true
        working-directory: sdk/runanywhere-swift
        run: |
          set -euo pipefail
          if command -v periphery >/dev/null 2>&1; then
            periphery scan --quiet
          else
            echo "::notice::periphery is not installed on this runner; advisory scan skipped"
          fi

  kotlin-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: android
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Download vendored Sherpa-ONNX (Android)
        run: bash sdk/runanywhere-commons/scripts/android/download-sherpa-onnx.sh
      - name: Build Android JNI libs
        run: ./scripts/build/build-core-android.sh
      - name: Kotlin SDK unit tests + debug assembly
        working-directory: sdk/runanywhere-kotlin
        run: ./gradlew testDebugUnitTest assembleDebug --no-daemon --max-workers=2
      - name: Stage debug SDK AARs for the Android example
        working-directory: examples/android/RunAnywhereAI
        run: ./scripts/stage-sdk-aars.sh debug
      - name: Android example unit tests + debug assembly
        working-directory: examples/android/RunAnywhereAI
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug --no-daemon --max-workers=2
      - name: ktlintCheck + detekt (lint lane)
        working-directory: sdk/runanywhere-kotlin
        run: ./gradlew ktlintCheck detekt --no-daemon

  flutter-pubget:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      # FLUTTER_VERSION is sourced from sdk/runanywhere-commons/VERSIONS (single
      # source of truth) by the setup-toolchain action. Bump the value in
      # VERSIONS to roll the Flutter pin across pr-build, release, and FVM.
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: flutter
      - name: Analyze and test the complete Flutter workspace
        working-directory: sdk/runanywhere-flutter
        run: |
          set -euo pipefail
          flutter pub get
          dart run melos bootstrap
          dart run melos run analyze
          dart run melos run test

  rn-typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: node
      # Repo root and sdk/runanywhere-react-native pin `packageManager: yarn@3.6.1`
      # (Yarn Berry). The runner's global yarn is 1.x and refuses to run, so we
      # activate the pinned version through Corepack before any `yarn` call.
      - name: Enable Corepack (yarn@3.6.1)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@3.6.1 --activate
      # Root lockfile gate: the RN example app is a root-workspace member, so
      # a stale root yarn.lock is still caught here even though the package
      # commands below run inside the standalone RN workspace.
      - name: Yarn install (repo root lockfile gate)
        run: yarn install --immutable
      - name: Jest unit tests (React Native example)
        run: yarn workspace runanywhere-ai-example test --runInBand --config jest.config.js
      # sdk/runanywhere-react-native is ALSO a standalone Yarn project with its
      # own pinned yarn.lock (fb060a368) and workspaces declaration.
      # `yarn workspace <name> run <script>` re-detects the project from the
      # package's cwd, and packages/core's nearest lockfile is the NESTED one —
      # so a root-only install leaves that project stateless and every package
      # command dies with "Couldn't find the node_modules state file". Install
      # and run everything inside the standalone workspace (the documented SDK
      # dev flow), with the root install kept above as the root-lockfile gate.
      - name: Yarn install (RN standalone workspace)
        working-directory: sdk/runanywhere-react-native
        run: yarn install --immutable
      - name: Typecheck React Native workspace
        working-directory: sdk/runanywhere-react-native
        run: yarn typecheck
      - name: ESLint (React Native workspace)
        working-directory: sdk/runanywhere-react-native
        run: yarn lint
      - name: Jest unit tests (@runanywhere/core)
        working-directory: sdk/runanywhere-react-native
        run: yarn workspace @runanywhere/core run test --runInBand

  web-typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: node
      # Install + typecheck from the workspace root so the in-tree
      # @runanywhere/proto-ts package (sdk/shared/proto-ts) is resolved as a
      # workspace member instead of being fetched from the npm registry. The
      # `typecheck` script builds proto-ts first, then typechecks core,
      # llamacpp, mlx, and onnx — exactly the surface this PR touches.
      # proto-ts is a workspace member of BOTH the repo-root Yarn workspace AND
      # the sdk/runanywhere-web npm workspace. When we cd into proto-ts and run
      # `npm install`, npm walks up, finds the root Yarn package.json with
      # `workspace:*` deps it can't parse, and bails (EUNSUPPORTEDPROTOCOL).
      # `--workspaces=false` keeps npm from inheriting the root workspace
      # context and resolves the long/protobufjs deps in-tree directly.
      - name: Install workspace dependencies
        working-directory: sdk/runanywhere-web
        run: npm ci --no-audit --no-fund
      # npm may clean the external workspace's own node_modules while laying
      # out the Web workspace. Install proto-ts last so TypeScript resolution
      # from its real path always sees its direct @bufbuild/protobuf dependency.
      - name: Install proto-ts dependencies (standalone install)
        working-directory: sdk/shared/proto-ts
        run: npm ci --no-audit --no-fund --workspaces=false
      - name: Typecheck Web workspace (proto-ts + packages)
        working-directory: sdk/runanywhere-web
        run: npm run typecheck
      - name: ESLint (Web workspace)
        working-directory: sdk/runanywhere-web
        run: npm run lint
      - name: Web unit tests
        working-directory: sdk/runanywhere-web
        run: npm test

  # Dedicated validation lane — runs the source-of-truth validation scripts
  # so deprecated-surface drift and RAC_API export drift cannot land silently.
  validation:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Deprecated surface check (strict)
        run: bash scripts/validation/gates/check_deprecated_surfaces.sh
      - name: RAC_API export drift check (strict)
        run: bash scripts/validation/commons/check_rac_api_exports.sh --strict
      - name: Kotlin release-boundary validator tests
        run: python3 sdk/runanywhere-kotlin/scripts/test_validate_public_artifacts.py
      - name: React Native release-boundary validator tests
        run: python3 sdk/runanywhere-react-native/scripts/test_validate_public_packages.py
      - name: Web release-boundary validator tests
        run: python3 sdk/runanywhere-web/scripts/test_validate_public_packages.py
      - name: HF-auth public API packaging parity
        run: |
          set -euo pipefail
          declaration='RAC_API rac_bool_t rac_http_hf_token_is_configured(void);'
          grep -Fq "$declaration" sdk/runanywhere-commons/include/rac/infrastructure/http/rac_http_client.h
          grep -Fxq '_rac_http_hf_token_is_configured' sdk/runanywhere-commons/exports/RACommons.exports
          grep -Fq "$declaration" sdk/runanywhere-swift/Sources/RunAnywhere/CRACommons/include/rac_http_client.h
