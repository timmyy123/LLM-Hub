// RunAnywhere v2 IDL — ergonomic solution configs.
//
// Solution configs are sugar on top of PipelineSpec. The core converts each
// solution config into a PipelineSpec internally. Frontends use these for
// the "20-line developer API" — callers never construct PipelineSpec directly
// for common use cases.

syntax = "proto3";

package runanywhere.v1;

option cc_enable_arenas          = true;
option java_multiple_files       = true;
option java_package              = "ai.runanywhere.proto.v1";
option java_outer_classname      = "SolutionsProto";
option objc_class_prefix         = "RAV1";
option csharp_namespace          = "Runanywhere.V1";
option swift_prefix              = "RA";
option go_package                = "github.com/runanywhere/runanywhere-sdks/idl/v1;runanywherev1";

// Top-level union dispatched to the matching solution loader.
message SolutionConfig {
    oneof config {
        VoiceAgentConfig voice_agent = 1;
        RAGConfig        rag         = 2;
        AgentLoopConfig  agent_loop  = 4;
        TimeSeriesConfig time_series = 5;
    }
    reserved 3;
    reserved "wake_word";
}

// ---------------------------------------------------------------------------
// SolutionType — discriminator for the kind of solution backing a
// `SolutionConfig` / `SolutionHandle`. Mirrors the `SolutionConfig.config`
// oneof arms so frontends can switch on a single enum value rather than
// inspecting the oneof shape.
// ---------------------------------------------------------------------------
enum SolutionType {
    SOLUTION_TYPE_UNSPECIFIED = 0;
    SOLUTION_TYPE_VOICE_AGENT = 1;
    SOLUTION_TYPE_RAG         = 2;
    reserved 3;
    reserved "SOLUTION_TYPE_WAKEWORD";
    SOLUTION_TYPE_TIME_SERIES = 4;
    SOLUTION_TYPE_AGENT_LOOP  = 5;
}

// ---------------------------------------------------------------------------
// SolutionHandle — opaque, serialisable descriptor for a started solution.
//
// The native side owns a `rac_solution_handle_t`; this message is the
// language-agnostic shape that frontends (Swift `SolutionHandle` class,
// Kotlin/Flutter/RN/Web equivalents) carry across the C ABI to identify
// the underlying instance. Lifecycle verbs (start/stop/cancel/feed/destroy)
// are issued against the C handle keyed by `handle_id`.
// ---------------------------------------------------------------------------
message SolutionHandle {
    // Stable, opaque identifier minted by the core for this solution
    // instance. Used as the lookup key for lifecycle calls.
    string handle_id        = 1;
    // String discriminator for the solution kind, e.g. "voice_agent",
    // "rag", "time_series", "agent_loop". Free-form for
    // forward-compat with future solutions; canonical values match the
    // `SolutionType` enum names lower-cased.
    string solution_type    = 2;
    // Wall-clock creation timestamp (ms since Unix epoch).
    int64  created_at_ms    = 3;
    // Optional engine-specific state string (e.g. "created", "running",
    // "stopped"). Empty when the host hasn't surfaced state.
    optional string state   = 4;
}

// ---------------------------------------------------------------------------
// VoiceAgent — the canonical streaming voice AI loop.
// ---------------------------------------------------------------------------
message VoiceAgentConfig {
    // Model identifiers — resolved against the model registry.
    string llm_model_id = 1;     // e.g. "qwen3-4b-q4_k_m"
    string stt_model_id = 2;     // e.g. "whisper-base"
    string tts_model_id = 3;     // e.g. "kokoro"
    string vad_model_id = 4;     // e.g. "silero-v5"

    // pass3-syn-025/030: explicit TTS voice id for multi-voice TTS engines
    // (Piper, eSpeak-NG, Sherpa-ONNX-TTS multi-voice). When unset, callers
    // fall back to using tts_model_id as the voice id — correct for
    // single-voice engines, wrong for multi-voice. Aligns the caller-facing
    // VoiceAgentConfig with the commons-facing RAVoiceAgentComposeConfig
    // (voice_agent_service.proto:214) which already exposes tts_voice_id.
    string tts_voice_id = 17;

    // Audio configuration.
    int32  sample_rate_hz = 5;   // default 16000
    int32  chunk_ms       = 6;   // default 20
    AudioSource audio_source = 7;

    // Absolute path to an audio file. Required when `audio_source` is
    // `AUDIO_SOURCE_FILE`; ignored for MICROPHONE / CALLBACK sources.
    string audio_file_path = 15;

    // Barge-in behavior.
    optional bool enable_barge_in = 8;  // default true when unset
    int32  barge_in_threshold_ms = 9;  // default 200

    // LLM behavior.
    string system_prompt = 10;
    int32  max_context_tokens = 11;
    float  temperature = 12;

    // Emit partial transcripts as UserSaidEvent{is_final=false}.
    bool   emit_partials = 13;

    // Emit thought tokens (qwen3, deepseek-r1) separately from answer tokens.
    bool   emit_thoughts = 14;

    // Optional explicit solution-kind tag. Redundant with the `SolutionConfig`
    // oneof arm; provided so callers that pass this message standalone (or
    // log it) can read a single discriminator. Defaults to UNSPECIFIED.
    optional SolutionType type_kind = 16;
}

enum AudioSource {
    AUDIO_SOURCE_UNSPECIFIED = 0;
    AUDIO_SOURCE_MICROPHONE  = 1;   // Platform mic (default)
    AUDIO_SOURCE_FILE        = 2;   // Path supplied in audio_file_path
    AUDIO_SOURCE_CALLBACK    = 3;   // Frontend feeds frames via C ABI
}

// ---------------------------------------------------------------------------
// RAG — retrieve → rerank → prompt → LLM.
// ---------------------------------------------------------------------------
message RAGConfig {
    string embed_model_id  = 1;    // e.g. "bge-small-en-v1.5"
    string rerank_model_id = 2;    // e.g. "bge-reranker-v2-m3"
    string llm_model_id    = 3;

    // Vector store — USearch (in-process HNSW, default) or remote pgvector.
    VectorStore vector_store = 4;
    string      vector_store_path = 5;   // Local path for USearch index

    int32  retrieve_k = 6;         // default 24
    int32  rerank_top = 7;         // default 6

    // BM25 parameters.
    float  bm25_k1 = 8;            // default 1.2
    float  bm25_b  = 9;            // default 0.75

    // RRF fusion parameter.
    int32  rrf_k   = 10;           // default 60

    // Prompt template. Supports {{context}} and {{query}} placeholders.
    string prompt_template = 11;

    // Optional explicit solution-kind tag. See `SolutionType`.
    optional SolutionType type_kind = 12;
}

enum VectorStore {
    VECTOR_STORE_UNSPECIFIED = 0;
    VECTOR_STORE_USEARCH     = 1;  // default, in-process HNSW
    VECTOR_STORE_PGVECTOR    = 2;  // remote, server deployments only
}

// ---------------------------------------------------------------------------
// Agent loop — multi-turn LLM with tool calling.
// ---------------------------------------------------------------------------
message AgentLoopConfig {
    string llm_model_id = 1;
    string system_prompt = 2;
    repeated ToolSpec tools = 3;
    int32  max_iterations = 4;     // default 10
    int32  max_context_tokens = 5;

    // Optional explicit solution-kind tag. See `SolutionType`.
    optional SolutionType type_kind = 6;
}

message ToolSpec {
    string name        = 1;
    string description = 2;
    string json_schema = 3;        // Parameters schema, OpenAI-compatible
}

// ---------------------------------------------------------------------------
// Time series — window + anomaly_detect + generate_text.
// ---------------------------------------------------------------------------
message TimeSeriesConfig {
    string anomaly_model_id = 1;
    string llm_model_id     = 2;
    int32  window_size      = 3;   // Samples per window
    int32  stride           = 4;
    float  anomaly_threshold = 5;

    // Optional explicit solution-kind tag. See `SolutionType`.
    optional SolutionType type_kind = 6;
}

// Logical solutions service contract. Solution lifecycle verbs (create/start/
// stop/destroy) mirror the `rac_solution_handle_t` C ABI. Host UI, progress
// surfacing, and side effects remain adapter-owned; this service describes
// only the portable ergonomic entry points over generated messages.
service Solutions {
    // Instantiate a solution from a SolutionConfig oneof.
    rpc Create(SolutionConfig) returns (SolutionHandle);

    // Transition the solution to a running state.
    rpc Start(SolutionHandle) returns (SolutionHandle);

    // Transition the solution to a stopped state (resumable).
    rpc Stop(SolutionHandle) returns (SolutionHandle);

    // Terminate the solution and release native resources.
    rpc Destroy(SolutionHandle) returns (SolutionHandle);
}
