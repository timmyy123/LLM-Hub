// RunAnywhere IDL — model download progress streaming service.
//
// Server-streaming rpc returning per-chunk download
// progress + extraction + validation events. Replaces the per-SDK download
// observers (Kotlin DownloadProgress channel, Dart Stream<DownloadProgress>,
// Swift Combine.PassthroughSubject) with one schema + 5 thin adapters.

syntax = "proto3";

package runanywhere.v1;

import "model_types.proto";

option cc_enable_arenas      = true;
option java_multiple_files   = true;
option java_package          = "ai.runanywhere.proto.v1";
option java_outer_classname  = "DownloadServiceProto";
option objc_class_prefix     = "RAV1";
option csharp_namespace      = "Runanywhere.V1";
option swift_prefix          = "RA";
option go_package            = "github.com/runanywhere/runanywhere-sdks/idl/v1;runanywherev1";

message DownloadSubscribeRequest {
    string model_id = 1;
    string task_id  = 2;
}

message DownloadProgress {
    string         model_id          = 1;
    DownloadStage  stage             = 2;
    int64          bytes_downloaded  = 3;
    int64          total_bytes       = 4;   // 0 if unknown
    float          stage_progress    = 5;   // 0.0..1.0 within current stage
    float          overall_speed_bps = 6;
    int64          eta_seconds       = 7;   // -1 if unknown
    DownloadState  state             = 8;
    int32          retry_attempt     = 9;   // 0 on first try
    string         error_message     = 10;  // populated when state == FAILED
    string         task_id           = 11;
    int32          current_file_index = 12; // 0-based within the planned file list
    int32          total_files       = 13;
    string         storage_key       = 14;  // C++ storage identifier, not a platform file handle
    string         local_path        = 15;  // final path once known
    float          overall_progress  = 16;  // 0.0..1.0 across all planned files/stages
    int64          started_at_unix_ms = 17;
    int64          updated_at_unix_ms = 18;
    string         current_file_name  = 19;
    string         resume_token       = 20;  // logical resume marker, not a native handle
}

enum DownloadStage {
    DOWNLOAD_STAGE_UNSPECIFIED = 0;
    DOWNLOAD_STAGE_DOWNLOADING = 1;
    DOWNLOAD_STAGE_EXTRACTING  = 2;
    DOWNLOAD_STAGE_VALIDATING  = 3;
    DOWNLOAD_STAGE_COMPLETED   = 4;
}

enum DownloadState {
    DOWNLOAD_STATE_UNSPECIFIED = 0;
    DOWNLOAD_STATE_PENDING     = 1;
    DOWNLOAD_STATE_DOWNLOADING = 2;
    DOWNLOAD_STATE_EXTRACTING  = 3;
    DOWNLOAD_STATE_RETRYING    = 4;
    DOWNLOAD_STATE_COMPLETED   = 5;
    DOWNLOAD_STATE_FAILED      = 6;
    DOWNLOAD_STATE_CANCELLED   = 7;
    DOWNLOAD_STATE_PAUSED      = 8;
    DOWNLOAD_STATE_RESUMING    = 9;
}

// Structured reason for a download plan/start/resume rejection. Lets every SDK
// branch on a stable enum instead of substring-matching the human-readable
// error_message (the prior approach, which silently broke on any reword).
enum DownloadFailureReason {
    DOWNLOAD_FAILURE_REASON_UNSPECIFIED                    = 0;
    // On-disk partial download is larger than the expected total byte count.
    DOWNLOAD_FAILURE_REASON_OVERSIZE_PARTIAL_BYTES         = 1;
    // Requested resume offset is past the expected total size.
    DOWNLOAD_FAILURE_REASON_RESUME_OFFSET_EXCEEDS_EXPECTED = 2;
    // On-disk partial is smaller than the requested resume offset.
    DOWNLOAD_FAILURE_REASON_PARTIAL_SMALLER_THAN_OFFSET    = 3;
    // The partial file changed (size/mtime) since the resume token was issued.
    DOWNLOAD_FAILURE_REASON_PARTIAL_CHANGED_BEFORE_RESUME  = 4;
    // Not enough free space to complete the download.
    DOWNLOAD_FAILURE_REASON_INSUFFICIENT_STORAGE           = 5;
}

// HTTP transport download status — numeric values MUST match
// rac_http_download_status_t (RAC_HTTP_DL_*) in
// sdk/runanywhere-commons/include/rac/infrastructure/http/rac_http_download.h.
// rac_http_download_execute returns this int directly through the C ABI;
// every SDK consumes the proto-generated enum so a new RAC_HTTP_DL_* value
// added in commons fails compilation across all bindings until the enum is
// extended here. OK = 0 mirrors the C ABI's success sentinel (no separate
// UNSPECIFIED needed — success is the proto3 zero default).
enum HttpDownloadStatus {
    HTTP_DOWNLOAD_STATUS_OK                    = 0;
    HTTP_DOWNLOAD_STATUS_NETWORK_ERROR         = 1;
    HTTP_DOWNLOAD_STATUS_FILE_ERROR            = 2;
    HTTP_DOWNLOAD_STATUS_INSUFFICIENT_STORAGE  = 3;
    HTTP_DOWNLOAD_STATUS_INVALID_URL           = 4;
    HTTP_DOWNLOAD_STATUS_CHECKSUM_FAILED       = 5;
    HTTP_DOWNLOAD_STATUS_CANCELLED             = 6;
    HTTP_DOWNLOAD_STATUS_SERVER_ERROR          = 7;
    HTTP_DOWNLOAD_STATUS_TIMEOUT               = 8;
    HTTP_DOWNLOAD_STATUS_NETWORK_UNAVAILABLE   = 9;
    HTTP_DOWNLOAD_STATUS_DNS_ERROR             = 10;
    HTTP_DOWNLOAD_STATUS_SSL_ERROR             = 11;
    HTTP_DOWNLOAD_STATUS_UNKNOWN               = 99;
}

// ---------------------------------------------------------------------------
// Download operation contracts.
//
// HTTP transport stays platform-owned: adapters provide auth, cookies,
// background-session identifiers, browser fetch handles, and byte streams.
// These messages capture C++-owned workflow decisions: what to fetch, where
// the normalized storage keys land, whether extraction/validation is required,
// and how start/cancel/resume state is reported to every SDK.
// ---------------------------------------------------------------------------

message DownloadPlanRequest {
    string             model_id              = 1;
    optional ModelInfo model                 = 2;
    bool               resume_existing       = 3;
    int64              available_storage_bytes = 4;
    bool               allow_metered_network = 5;
    string             storage_namespace     = 6;
    bool               validate_existing_bytes = 7;
    bool               verify_checksums      = 8;
    int64              required_free_bytes_after_download = 9;
}

message DownloadFilePlan {
    ModelFileDescriptor file                = 1;
    string              storage_key         = 2;
    string              destination_path    = 3;
    int64               expected_bytes      = 4;
    bool                requires_extraction = 5;
    string              checksum_sha256     = 6;
    bool                is_resume_candidate = 7;
}

message DownloadPlanResult {
    bool                  can_start          = 1;
    string                model_id           = 2;
    repeated DownloadFilePlan files          = 3;
    int64                 total_bytes        = 4;
    bool                  requires_extraction = 5;
    bool                  can_resume         = 6;
    int64                 resume_from_bytes  = 7;
    repeated string       warnings           = 8;
    string                error_message      = 9;
    string                storage_namespace  = 10;
    string                resume_token       = 11;
    int64                 required_free_bytes_after_download = 12;
    DownloadFailureReason failure_reason     = 13;  // structured companion to error_message
}

message DownloadStartRequest {
    string              model_id = 1;
    DownloadPlanResult  plan     = 2;
    bool                resume   = 3;
    string              resume_token = 4;
    bool                update_registry_on_completion = 5;
}

message DownloadStartResult {
    bool             accepted         = 1;
    string           task_id          = 2;
    string           model_id         = 3;
    DownloadProgress initial_progress = 4;
    string           error_message    = 5;
    string           resume_token     = 6;
    DownloadFailureReason failure_reason = 7;  // structured companion to error_message
}

message DownloadCancelRequest {
    string task_id              = 1;
    string model_id             = 2;
    bool   delete_partial_bytes = 3;
}

message DownloadCancelResult {
    bool   success               = 1;
    string task_id               = 2;
    string model_id              = 3;
    int64  partial_bytes_deleted = 4;
    string error_message         = 5;
    bool   was_running           = 6;
    bool   partial_bytes_preserved = 7;
    string resume_token          = 8;
}

message DownloadResumeRequest {
    string task_id           = 1;
    string model_id          = 2;
    int64  resume_from_bytes = 3;
    string resume_token      = 4;
    bool   validate_partial_bytes = 5;
}

message DownloadResumeResult {
    bool             accepted         = 1;
    string           task_id          = 2;
    string           model_id         = 3;
    DownloadProgress initial_progress = 4;
    string           error_message    = 5;
    string           resume_token     = 6;
    DownloadFailureReason failure_reason = 7;  // structured companion to error_message
}

service Download {
    rpc Plan(DownloadPlanRequest) returns (DownloadPlanResult);
    rpc Start(DownloadStartRequest) returns (DownloadStartResult);

    // Server-streaming: emits a DownloadProgress message every time
    // bytes_downloaded crosses a per-engine reporting threshold (currently
    // every 64 KiB) until state ∈ {COMPLETED, FAILED, CANCELLED}.
    rpc Subscribe(DownloadSubscribeRequest) returns (stream DownloadProgress);

    rpc Cancel(DownloadCancelRequest) returns (DownloadCancelResult);
    rpc Resume(DownloadResumeRequest) returns (DownloadResumeResult);
}
