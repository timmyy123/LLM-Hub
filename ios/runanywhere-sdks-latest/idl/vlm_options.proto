syntax = "proto3";

package runanywhere.v1;

import "model_types.proto";

option cc_enable_arenas          = true;
option java_multiple_files       = true;
option java_package              = "ai.runanywhere.proto.v1";
option java_outer_classname      = "VlmOptionsProto";
option objc_class_prefix         = "RAV1";
option csharp_namespace          = "Runanywhere.V1";
option swift_prefix              = "RA";
option go_package                = "github.com/runanywhere/runanywhere-sdks/idl/v1;runanywherev1";

// ---------------------------------------------------------------------------
// VLM image input format — union across all SDKs and the C ABI.
//
// SDK ↔ proto enum mapping pre-IDL:
//   C ABI  / Kotlin / RN / Web all expose three numeric formats (FILE_PATH=0,
//          RGB_PIXELS=1, BASE64=2). Mapped to FILE_PATH, RAW_RGB, BASE64.
//   Swift  Format enum adds Apple-only cases uiImage / pixelBuffer that are
//          flattened to RAW_RGB before crossing the C ABI (see VLMTypes.swift
//          lines 70-89). RAW_RGBA is reserved for SDKs that pass straight
//          RGBA pixel buffers without the BGRA→RGB downsample step.
//   Dart   sealed class with the same three formats (filePath / rgbPixels /
//          base64); Flutter adapter passes RGB pixels through to the C ABI.
//
// JPEG / PNG / WEBP are container hints carried in the encoded `bytes`
// payload (no current SDK declares these as enum cases — they are
// reserved here so we can disambiguate decoded vs encoded sources without a
// schema migration once a backend exposes container detection).
// ---------------------------------------------------------------------------
enum VLMImageFormat {
    VLM_IMAGE_FORMAT_UNSPECIFIED = 0;
    VLM_IMAGE_FORMAT_JPEG        = 1;   // reserved — encoded JPEG bytes
    VLM_IMAGE_FORMAT_PNG         = 2;   // reserved — encoded PNG bytes
    VLM_IMAGE_FORMAT_WEBP        = 3;   // reserved — encoded WebP bytes
    VLM_IMAGE_FORMAT_RAW_RGB     = 4;   // Swift rgbPixels / Kotlin RGB_PIXELS /
                                        // RN RGBPixels / Web RGBPixels /
                                        // C ABI RAC_VLM_IMAGE_FORMAT_RGB_PIXELS
    VLM_IMAGE_FORMAT_RAW_RGBA    = 5;   // reserved — raw RGBA pixel buffer
                                        // (Swift UIImage path produces RGBA
                                        // before downsample; pre-IDL no SDK
                                        // exposes RGBA over the C ABI)
    VLM_IMAGE_FORMAT_BASE64      = 6;   // Swift base64 / Kotlin BASE64 /
                                        // Dart base64 / RN Base64 /
                                        // Web Base64 /
                                        // C ABI RAC_VLM_IMAGE_FORMAT_BASE64
    VLM_IMAGE_FORMAT_FILE_PATH   = 7;   // Swift filePath / Kotlin FILE_PATH /
                                        // Dart filePath / RN FilePath /
                                        // Web FilePath /
                                        // C ABI RAC_VLM_IMAGE_FORMAT_FILE_PATH
}

// ---------------------------------------------------------------------------
// VLM model family for chat-template selection.
// Mirrors rac_vlm_model_family_t.
// ---------------------------------------------------------------------------
enum VLMModelFamily {
    VLM_MODEL_FAMILY_UNSPECIFIED = 0;
    VLM_MODEL_FAMILY_AUTO        = 1;
    VLM_MODEL_FAMILY_QWEN2_VL    = 2;
    VLM_MODEL_FAMILY_SMOLVLM     = 3;
    VLM_MODEL_FAMILY_LLAVA       = 4;
    VLM_MODEL_FAMILY_CUSTOM      = 99;
}

// ---------------------------------------------------------------------------
// Custom VLM chat template.
// Mirrors rac_vlm_chat_template_t.
// ---------------------------------------------------------------------------
message VLMChatTemplate {
    string template_text         = 1;
    optional string image_marker = 2;
    optional string default_system_prompt = 3;
}

// ---------------------------------------------------------------------------
// VLM image input.
//
// `source` is a oneof so that exactly one of {file_path, encoded, raw_rgb,
// base64} can be supplied per request. `width` / `height` are required for
// non-encoded formats (raw_rgb, raw_rgba) where the consumer cannot infer
// dimensions from a container header. `format` disambiguates encoded `bytes`
// payloads (JPEG / PNG / WEBP) and explicitly tags raw / file-path / base64
// sources.
// ---------------------------------------------------------------------------
message VLMImage {
    oneof source {
        string file_path = 1;   // VLM_IMAGE_FORMAT_FILE_PATH
        bytes  encoded   = 2;   // VLM_IMAGE_FORMAT_{JPEG,PNG,WEBP} container bytes
        bytes  raw_rgb   = 3;   // VLM_IMAGE_FORMAT_RAW_RGB / RAW_RGBA pixel buffer
        string base64    = 4;   // VLM_IMAGE_FORMAT_BASE64 (UTF-8 string)
    }

    // Required for VLM_IMAGE_FORMAT_RAW_RGB and VLM_IMAGE_FORMAT_RAW_RGBA
    // (consumers cannot infer dimensions for raw pixel buffers). Optional
    // for encoded / file_path / base64 sources where the decoder reads
    // dimensions from the container.
    int32 width  = 5;
    int32 height = 6;

    VLMImageFormat format = 7;

    // Optional source metadata. Adapters may populate this after camera/file
    // picker capture without exposing native APIs to core.
    optional string media_type = 8;
    optional string name = 9;
    int64 size_bytes = 10;
    map<string, string> metadata = 11;
}

// ---------------------------------------------------------------------------
// VLM component configuration.
// Sources pre-IDL:
//   Kotlin VLMTypes.kt:163        (modelId, contextLength, temperature,
//                                  maxTokens, systemPrompt, streamingEnabled,
//                                  preferredFramework)
//   C ABI  rac_vlm_types.h:224    (model_id, preferred_framework,
//                                  context_length, temperature, max_tokens,
//                                  system_prompt, streaming_enabled)
//
// Per the canonicalization brief, only the load-bearing identification +
// limits cross the IDL boundary here: model_id, max_image_size_px, max_tokens.
// Per-request sampling parameters live on VLMGenerationOptions; runtime
// streaming toggles and chat-template selection stay backend-private.
// ---------------------------------------------------------------------------
message VLMConfiguration {
    string model_id            = 1;
    int32  max_image_size_px   = 2;   // Kotlin maxImageSize / C ABI max_image_size
                                      // (0 = backend default)
    int32  max_tokens          = 3;   // Kotlin maxTokens / C ABI max_tokens

    // Additional component-level fields from rac_vlm_config_t.
    int32  context_length      = 4;
    float  temperature         = 5;
    optional string system_prompt = 6;
    bool   streaming_enabled   = 7;
    optional InferenceFramework preferred_framework = 8;
}

// ---------------------------------------------------------------------------
// VLM generation options — per-request sampling + prompt parameters.
// Sources pre-IDL:
//   Kotlin VLMTypes.kt:103        (maxTokens, temperature, topP, systemPrompt,
//                                  maxImageSize, nThreads, useGpu)
//   Dart   vlm_types.dart:127     (maxTokens, temperature, topP, systemPrompt,
//                                  maxImageSize, nThreads, useGpu)
//   RN     VLMTypes.ts:21         (maxTokens, temperature, topP)
//   Web    VLMTypes.ts:28         (maxTokens, temperature, topP, systemPrompt,
//                                  modelFamily, streaming)
//   C ABI  rac_vlm_types.h:143    (max_tokens, temperature, top_p,
//                                  stop_sequences, num_stop_sequences,
//                                  streaming_enabled, system_prompt,
//                                  max_image_size, n_threads, use_gpu,
//                                  model_family, custom_chat_template,
//                                  image_marker_override)
//
// top_k is included to align with the other text generation services
// (LLM / chat) even though no current VLM SDK exposes it; the C ABI's
// llama.cpp backend already supports top_k internally.
// ---------------------------------------------------------------------------
message VLMGenerationOptions {
    string prompt      = 1;
    int32  max_tokens  = 2;
    float  temperature = 3;
    float  top_p       = 4;
    int32  top_k       = 5;

    // Full rac_vlm_options_t coverage.
    repeated string stop_sequences = 6;
    bool   streaming_enabled = 7;
    optional string system_prompt = 8;
    int32  max_image_size = 9;
    int32  n_threads = 10;
    bool   use_gpu = 11;
    VLMModelFamily model_family = 12;
    optional VLMChatTemplate custom_chat_template = 13;
    optional string image_marker_override = 14;

    // Additional llama.cpp sampling knobs and result controls.
    int64 seed = 15;
    float repetition_penalty = 16;
    float min_p = 17;
    bool emit_image_embeddings = 18;
}

message VLMGenerationRequest {
    string request_id = 1;
    repeated VLMImage images = 2;
    optional VLMGenerationOptions options = 3;
    optional string model_id = 4;
    map<string, string> metadata = 5;
}

// ---------------------------------------------------------------------------
// VLM generation result.
// Sources pre-IDL:
//   Swift  VLMTypes.swift:208     (text, promptTokens, completionTokens,
//                                  totalTimeMs as Double, tokensPerSecond)
//   Kotlin VLMTypes.kt:120        (text, promptTokens, imageTokens,
//                                  completionTokens, totalTokens,
//                                  timeToFirstTokenMs, imageEncodeTimeMs,
//                                  totalTimeMs, tokensPerSecond)
//   Dart   vlm_types.dart:68      (text, promptTokens, completionTokens,
//                                  totalTimeMs, tokensPerSecond)
//   RN     VLMTypes.ts:28         (text, promptTokens, completionTokens,
//                                  totalTimeMs, tokensPerSecond)
//   Web    VLMTypes.ts:38         (VLMGenerationResult: text, promptTokens,
//                                  imageTokens, completionTokens, totalTokens,
//                                  timeToFirstTokenMs, imageEncodeTimeMs,
//                                  totalTimeMs, tokensPerSecond, hardwareUsed)
//   C ABI  rac_vlm_types.h:268    (text, prompt_tokens, image_tokens,
//                                  completion_tokens, total_tokens,
//                                  time_to_first_token_ms,
//                                  image_encode_time_ms, total_time_ms,
//                                  tokens_per_second)
//
// Streaming note: the VLM service emits VLMStreamEvent messages for
// per-token deltas and terminal results; this aggregate result is carried on
// the unary Generate RPC and on terminal stream events.
// ---------------------------------------------------------------------------
message VLMResult {
    string text                = 1;
    int32  prompt_tokens       = 2;
    int32  completion_tokens   = 3;
    int64  total_tokens        = 4;
    int64  processing_time_ms  = 5;   // Kotlin/C ABI total_time_ms;
                                      // Swift VLMResult totalTimeMs (Double ms).
    float  tokens_per_second   = 6;

    // Detailed VLM metrics from Kotlin/Web/C ABI.
    int32  image_tokens             = 7;
    int64  time_to_first_token_ms   = 8;
    int64  image_encode_time_ms     = 9;
    optional string hardware_used   = 10;

    optional string error_message   = 11;
    int32 error_code                = 12;
    string finish_reason            = 13;
    int32 images_processed          = 14;
}

// ---------------------------------------------------------------------------
// VLM error codes — canonical SDK-facing surface.
// Sources pre-IDL:
//   Swift  CppBridge+VLM.swift:184  (notInitialized=1, modelLoadFailed=2,
//                                    processingFailed=3, invalidImage=4,
//                                    cancelled=5)
//   Dart   vlm_types.dart:164       (notInitialized=1, modelLoadFailed=2,
//                                    processingFailed=3, invalidImage=4,
//                                    cancelled=5)
//   RN     VLMTypes.ts:44           (NotInitialized=1, ModelLoadFailed=2,
//                                    ProcessingFailed=3, InvalidImage=4,
//                                    Cancelled=5)
//   Kotlin / Web                    (no enum declared pre-IDL)
//
// VLMErrorCode deleted. All VLM error codes now route through the
// canonical `ErrorCode` taxonomy defined in `errors.proto`:
//   - ERROR_CODE_MODEL_NOT_LOADED    = 116 (Swift/Dart/RN notInitialized +
//                                          modelLoadFailed)
//   - ERROR_CODE_CANCELLED           = 380 (Swift/Dart/RN cancelled)
//   - ERROR_CODE_PROCESSING_FAILED   = 234 (Swift/Dart/RN processingFailed)
//   - ERROR_CODE_INVALID_INPUT       = 251 (Swift/Dart/RN invalidImage)
//   - ERROR_CODE_INVALID_FORMAT      = 252 (VLMImageFormat backend cannot decode)
//   - ERROR_CODE_NOT_INITIALIZED     = 100
//   - ERROR_CODE_MODEL_LOAD_FAILED   = 111
//   - ERROR_CODE_VALIDATION_FAILED   = 250 (image exceeds max_image_size_px)
// ---------------------------------------------------------------------------

enum VLMStreamEventKind {
    VLM_STREAM_EVENT_KIND_UNSPECIFIED = 0;
    VLM_STREAM_EVENT_KIND_STARTED = 1;
    VLM_STREAM_EVENT_KIND_IMAGE_ENCODED = 2;
    VLM_STREAM_EVENT_KIND_TOKEN = 3;
    VLM_STREAM_EVENT_KIND_COMPLETED = 4;
    VLM_STREAM_EVENT_KIND_ERROR = 5;
}

message VLMStreamEvent {
    uint64 seq = 1;
    int64 timestamp_us = 2;
    string request_id = 3;
    VLMStreamEventKind kind = 4;
    string token = 5;
    int32 token_index = 6;
    bool is_final = 7;
    float tokens_per_second = 8;
    optional VLMResult result = 9;
    optional string error_message = 10;
    int32 error_code = 11;
}

message VLMServiceState {
    bool is_ready = 1;
    optional string current_model = 2;
    int32 context_length = 3;
    bool supports_streaming = 4;
    bool supports_multiple_images = 5;
    optional string vision_encoder_type = 6;
    optional string error_message = 7;
    int32 error_code = 8;
}

// Logical VLM service contract. Native camera capture, file picking, image
// decoding performed by OS media APIs, and backend execution remain
// adapter-owned; C++ consumes only serialized request/result/event messages.
service VLM {
    // One-shot multimodal generation returning aggregate text and metrics.
    rpc Generate(VLMGenerationRequest) returns (VLMResult);

    // Server-streaming generation events: start, image preprocessing,
    // per-token text deltas, terminal completion, and errors.
    rpc Stream(VLMGenerationRequest) returns (stream VLMStreamEvent);
}
