// RunAnywhere IDL — streaming events emitted by the VoiceAgent solution.
//
// Every frontend binds to this schema via its native proto3 codegen
// (swift-protobuf, Wire, protobuf.dart, ts-proto). There is NO hand-written
// event type in any frontend adapter.

syntax = "proto3";

package runanywhere.v1;

import "component_types.proto";
import "errors.proto";
import "vad_options.proto";

option cc_enable_arenas          = true;
option java_multiple_files       = true;
option java_package              = "ai.runanywhere.proto.v1";
option java_outer_classname      = "VoiceEventsProto";
option objc_class_prefix         = "RAV1";
option csharp_namespace          = "Runanywhere.V1";
option swift_prefix              = "RA";
option go_package                = "github.com/runanywhere/runanywhere-sdks/idl/v1;runanywherev1";

enum VoicePipelineComponent {
    VOICE_PIPELINE_COMPONENT_UNSPECIFIED = 0;
    VOICE_PIPELINE_COMPONENT_AGENT       = 1;
    VOICE_PIPELINE_COMPONENT_STT         = 2;
    VOICE_PIPELINE_COMPONENT_ASR         = 3;
    VOICE_PIPELINE_COMPONENT_TTS         = 4;
    VOICE_PIPELINE_COMPONENT_VAD         = 5;
    VOICE_PIPELINE_COMPONENT_STD         = 6;
    VOICE_PIPELINE_COMPONENT_LLM         = 7;
    VOICE_PIPELINE_COMPONENT_AUDIO       = 8;
    VOICE_PIPELINE_COMPONENT_WAKEWORD    = 9;
}

// ---------------------------------------------------------------------------
// Sum type emitted on the output edge of the VoiceAgent pipeline.
// ---------------------------------------------------------------------------
message VoiceEvent {
    // Monotonic pipeline-local sequence number. Useful for frontends that
    // need to detect gaps after reconnection or out-of-order delivery.
    uint64 seq            = 1;

    // Wall-clock timestamp captured at the C++ edge, in microseconds since
    // Unix epoch. Frontends may re-timestamp for UI display.
    int64  timestamp_us   = 2;

    EventCategory       category  = 3;
    ErrorSeverity       severity  = 4;
    VoicePipelineComponent component = 5;

    // Exactly one of the following is populated on every event.
    oneof payload {
        UserSaidEvent     user_said        = 10;
        AssistantTokenEvent assistant_token = 11;
        AudioFrameEvent   audio            = 12;
        VADEvent          vad              = 13;
        InterruptedEvent  interrupted      = 14;
        StateChangeEvent  state            = 15;
        ErrorEvent        error            = 16;
        MetricsEvent      metrics          = 17;

        // Voice agent lifecycle events. Mirror Swift VoiceSessionError /
        // VoiceAgentComponentStates and the AsyncSequence-style lifecycle
        // signals consumed by the cross-platform VoiceAgent extensions
        // (Swift VoiceAgentTypes.swift, Kotlin VoiceAgentTypes.kt, RN
        // VoiceAgentTypes.ts, Web VoiceAgentCTypes.ts, Flutter
        // voice_agent_types.dart).
        VoiceAgentComponentStates component_state_changed = 18;
        VoiceSessionError         session_error           = 19;
        SessionStartedEvent       session_started         = 20;
        SessionStoppedEvent       session_stopped         = 21;
        AgentResponseStartedEvent agent_response_started  = 22;
        AgentResponseCompletedEvent agent_response_completed = 23;
        SpeechTurnDetectionEvent  speech_turn_detection   = 24;
        TurnLifecycleEvent        turn_lifecycle          = 25;
        WakeWordDetectedEvent     wakeword_detected       = 26;
        AudioLevelEvent           audio_level             = 27;
        ComponentProgressEvent    component_progress      = 28;
    }

    // Correlation fields shared by streaming and one-shot voice turns.
    string session_id = 30;
    string turn_id = 31;
    string request_id = 32;
    map<string, string> metadata = 33;
}

// User speech finalized by STT (is_final=false → partial hypothesis).
message UserSaidEvent {
    string text           = 1;
    bool   is_final       = 2;
    float  confidence     = 3;    // 0.0..1.0, engine-dependent
    int64  audio_start_us = 4;
    int64  audio_end_us   = 5;
    string language_code  = 6;
    int32  segment_index  = 7;
}

// Single token decoded by the LLM. is_final=true on the last token of a
// response (end-of-stream marker).
message AssistantTokenEvent {
    string text           = 1;
    bool   is_final       = 2;
    TokenKind kind        = 3;
    uint32 token_id       = 4;
    float  logprob        = 5;
    string finish_reason  = 6;
}

enum TokenKind {
    TOKEN_KIND_UNSPECIFIED = 0;
    TOKEN_KIND_ANSWER      = 1;   // Regular content token
    TOKEN_KIND_THOUGHT     = 2;   // Chain-of-thought token (qwen3, deepseek-r1)
    TOKEN_KIND_TOOL_CALL   = 3;   // Parsed tool-call directive
}

// A chunk of synthesized PCM audio, ready for the sink. The frontend is
// expected to copy the bytes out; the C ABI does NOT retain ownership.
message AudioFrameEvent {
    bytes pcm             = 1;    // f32 little-endian interleaved
    int32 sample_rate_hz  = 2;    // usually 24000 for Kokoro, 22050 for Piper
    int32 channels        = 3;    // 1 for mono
    AudioEncoding encoding = 4;

    // True for the final audio chunk in a TTS/voice-agent audio stream.
    bool  is_final        = 5;
    int32 chunk_index      = 6;
    int64 duration_ms      = 7;
}

enum AudioEncoding {
    AUDIO_ENCODING_UNSPECIFIED = 0;
    AUDIO_ENCODING_PCM_F32_LE  = 1;
    AUDIO_ENCODING_PCM_S16_LE  = 2;
}

// Voice Activity Detection output. Frontends usually do not need this —
// exposed for debugging and custom UIs (waveform highlighting, etc.).
// `type` uses the canonical VADStreamEventKind enum from
// vad_options.proto (the hand-rolled VADEventType was deleted).
message VADEvent {
    VADStreamEventKind type     = 1;
    int64  frame_offset_us = 2;
    float  confidence      = 3;
    bool   is_speech       = 4;
    double speech_duration_ms = 5;
    double silence_duration_ms = 6;
    double noise_floor_db  = 7;
}

// Assistant playback was interrupted by a barge-in. The reason distinguishes
// user barge-in from app-initiated cancel.
message InterruptedEvent {
    InterruptReason reason = 1;
    string          detail = 2;
}

enum InterruptReason {
    INTERRUPT_REASON_UNSPECIFIED = 0;
    INTERRUPT_REASON_USER_BARGE_IN = 1;
    INTERRUPT_REASON_APP_STOP    = 2;
    INTERRUPT_REASON_AUDIO_ROUTE_CHANGE = 3;
    INTERRUPT_REASON_TIMEOUT     = 4;
}

// Pipeline lifecycle state. Ordered — callers can compare numerically.
message StateChangeEvent {
    PipelineState previous = 1;
    PipelineState current  = 2;
}

enum PipelineState {
    PIPELINE_STATE_UNSPECIFIED = 0;
    PIPELINE_STATE_IDLE      = 1;
    PIPELINE_STATE_LISTENING = 2;
    PIPELINE_STATE_THINKING  = 3;
    PIPELINE_STATE_SPEAKING  = 4;
    PIPELINE_STATE_STOPPED   = 5;
    PIPELINE_STATE_WAITING_WAKEWORD = 6;
    PIPELINE_STATE_PROCESSING_SPEECH = 7;
    PIPELINE_STATE_GENERATING_RESPONSE = 8;
    PIPELINE_STATE_PLAYING_TTS = 9;
    PIPELINE_STATE_COOLDOWN = 10;
    PIPELINE_STATE_ERROR = 11;
}

// Terminal or recoverable error in the pipeline. Frontends map these to
// their native error types.
message ErrorEvent {
    int32  code           = 1;   // See ra_status_t in core/abi/ra_primitives.h
    string message        = 2;
    string component      = 3;   // "llm", "stt", "tts", "vad", "pipeline", ...
    bool   is_recoverable = 4;
    string operation      = 5;
    string details_json   = 6;
}

// Per-primitive latency breakdown. Emitted at barge-in and at pipeline stop.
message MetricsEvent {
    double stt_final_ms       = 1;
    double llm_first_token_ms = 2;
    double tts_first_audio_ms = 3;
    double end_to_end_ms      = 4;
    int64  tokens_generated   = 5;
    int64  audio_samples_played = 6;

    // True when `end_to_end_ms` exceeded the `PipelineOptions.latency_budget_ms`
    // configured for this run. Frontends can surface this to the UI for SLO
    // dashboards without re-computing the threshold themselves.
    bool   is_over_budget     = 7;

    // Monotonic producer-side timestamp in nanoseconds. Set by the
    // producer (C++ dispatcher) at event-emit time; read by consumers
    // (5-SDK perf_bench + p50 benchmark CI) to compute event-to-frontend
    // latency without relying on wall-clock sync. Encoded as int64 so
    // std::chrono::steady_clock::now().time_since_epoch() values fit
    // directly (2^63 ns ≈ 292 years of runtime headroom).
    int64  created_at_ns      = 8;
    double vad_first_speech_ms = 9;
    double stt_first_partial_ms = 10;
    double llm_total_ms = 11;
    double tts_total_ms = 12;
}

message AudioLevelEvent {
    float rms = 1;
    float peak = 2;
    float noise_floor_db = 3;
    bool is_speech = 4;
}

message ComponentProgressEvent {
    VoicePipelineComponent component = 1;
    string operation = 2;
    float progress = 3;
    string message = 4;
}

// ---------------------------------------------------------------------------
// VoiceAgent component-load lifecycle.
//
// Describes whether each sub-component (STT, LLM, TTS, VAD, wake-word) of the
// voice agent has been loaded yet. Emitted on the
// `VoiceEvent.component_state_changed` oneof arm whenever any component
// transitions. Uses the canonical `ComponentLifecycleState` enum from
// component_types.proto.
// ---------------------------------------------------------------------------

// Aggregate load state across all four voice-agent components. Mirrors Swift
// `VoiceAgentComponentStates`, Kotlin `VoiceAgentComponentStates`, RN
// `VoiceAgentComponentStates`, Web `VoiceAgentComponentStates`, and Flutter
// `VoiceAgentComponentStates`.
//
// The former `ComponentLoadState` enum was consolidated into the
// canonical richer `ComponentLifecycleState` (component_types.proto). Where
// the old enum's `COMPONENT_LOAD_STATE_LOADED` value was used to mean "this
// component is ready to use", callers now use
// `COMPONENT_LIFECYCLE_STATE_READY`.
message VoiceAgentComponentStates {
    ComponentLifecycleState stt_state = 1;
    ComponentLifecycleState llm_state = 2;
    ComponentLifecycleState tts_state = 3;
    ComponentLifecycleState vad_state = 4;

    // Computed: true when stt_state, llm_state, tts_state, vad_state are all
    // COMPONENT_LIFECYCLE_STATE_READY. Producer sets this; consumers must NOT
    // recompute.
    bool ready       = 5;

    // Computed: true when any of the four states is
    // COMPONENT_LIFECYCLE_STATE_LOADING.
    bool any_loading = 6;

    ComponentLifecycleState wakeword_state = 7;
    optional string error_message = 8;
}

// ---------------------------------------------------------------------------
// Voice session error taxonomy.
//
// Mirrors Swift `VoiceSessionError`, Kotlin `VoiceSessionError`. The
// `failed_component` field is populated only for component-failure mappings —
// naming the sub-component that produced the underlying error ("stt", "llm",
// "tts", "vad", "wakeword").
//
// The private `VoiceSessionErrorCode` enum was removed in favour of
// the canonical `ErrorCode` from `errors.proto`. Mapping from legacy cases:
//   - MICROPHONE_PERMISSION_DENIED -> ERROR_CODE_MICROPHONE_PERMISSION_DENIED = 282
//   - NOT_READY                    -> ERROR_CODE_COMPONENT_NOT_READY          = 230
//   - ALREADY_RUNNING              -> ERROR_CODE_SERVICE_BUSY                 = 233
//   - COMPONENT_FAILURE            -> ERROR_CODE_PROCESSING_FAILED            = 234
// ---------------------------------------------------------------------------

message VoiceSessionError {
    ErrorCode             code            = 1;
    string                message         = 2;
    optional string       failed_component = 3;
    int32                 c_abi_code      = 4;
    bool                  recoverable     = 5;
}

// ---------------------------------------------------------------------------
// Voice session lifecycle markers.
//
// Mirror the AsyncSequence / Flow lifecycle signals emitted by the per-SDK
// VoiceAgent extensions. Carry no payload of their own — the surrounding
// VoiceEvent already provides `seq`, `timestamp_us`, and (via MetricsEvent)
// the latency breakdown.
// ---------------------------------------------------------------------------

message SessionStartedEvent {
    string session_id = 1;
}

message SessionStoppedEvent {
    string session_id = 1;
    string reason = 2;
}

message AgentResponseStartedEvent {
    string turn_id = 1;
}

message AgentResponseCompletedEvent {
    string turn_id = 1;
    int64 response_duration_ms = 2;
}

message SpeechTurnDetectionEvent {
    SpeechTurnDetectionEventKind kind = 1;
    string speaker_id = 2;
    int64  turn_start_us = 3;
    int64  turn_end_us = 4;
    float  confidence = 5;
    double speech_duration_ms = 6;
    double silence_duration_ms = 7;
}

enum SpeechTurnDetectionEventKind {
    SPEECH_TURN_DETECTION_EVENT_KIND_UNSPECIFIED = 0;
    SPEECH_TURN_DETECTION_EVENT_KIND_TURN_STARTED = 1;
    SPEECH_TURN_DETECTION_EVENT_KIND_TURN_ENDED = 2;
    SPEECH_TURN_DETECTION_EVENT_KIND_SPEAKER_CHANGED = 3;
    SPEECH_TURN_DETECTION_EVENT_KIND_STATISTICS = 4;
}

message TurnLifecycleEvent {
    TurnLifecycleEventKind kind = 1;
    string turn_id = 2;
    string session_id = 3;
    string transcript = 4;
    string response = 5;
    string error = 6;
    int64 started_at_ms = 7;
    int64 completed_at_ms = 8;
}

message WakeWordDetectedEvent {
    string wake_word = 1;
    float confidence = 2;
    int64 timestamp_ms = 3;
    string model_id = 4;
    int32 model_index = 5;
    int64 duration_ms = 6;
}

enum TurnLifecycleEventKind {
    TURN_LIFECYCLE_EVENT_KIND_UNSPECIFIED = 0;
    TURN_LIFECYCLE_EVENT_KIND_STARTED = 1;
    TURN_LIFECYCLE_EVENT_KIND_USER_SPEECH_STARTED = 2;
    TURN_LIFECYCLE_EVENT_KIND_USER_SPEECH_ENDED = 3;
    TURN_LIFECYCLE_EVENT_KIND_TRANSCRIPTION_FINAL = 4;
    TURN_LIFECYCLE_EVENT_KIND_AGENT_RESPONSE_STARTED = 5;
    TURN_LIFECYCLE_EVENT_KIND_AGENT_RESPONSE_COMPLETED = 6;
    TURN_LIFECYCLE_EVENT_KIND_COMPLETED = 7;
    TURN_LIFECYCLE_EVENT_KIND_CANCELLED = 8;
    TURN_LIFECYCLE_EVENT_KIND_FAILED = 9;
}
