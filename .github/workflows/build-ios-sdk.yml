name: Build iOS SDK (Patched)

# Builds RACommons + RABackendLLAMACPP XCFrameworks from the local patched
# runanywhere-sdks-latest source (Q2_0 Bonsai + batch-size fixes)
# and publishes them as release assets under the `ios-sdk-v*-patched` tag.
#
# TRIGGER: manually via workflow_dispatch, or by pushing a tag like
#          ios-sdk-v0.19.7-patched
#
# OUTPUT: GitHub Release with:
#   - RACommons-v0.19.7.zip           (RACommons.xcframework zipped)
#   - RABackendLLAMACPP-v0.19.7.zip   (RABackendLLAMACPP.xcframework zipped)
#   - checksums.txt                   (SHA-256 for both ZIPs)

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'SDK version (used in ZIP names and release tag)'
        required: true
        default: '0.19.7'
      release_tag:
        description: 'Release tag to create/update'
        required: true
        default: 'ios-sdk-v0.19.7-patched-v9'

  push:
    tags:
      - 'ios-sdk-v*-patched*'

jobs:
  build:
    name: Build XCFrameworks
    runs-on: macos-15

    env:
      SDK_VERSION: ${{ github.event.inputs.sdk_version || '0.19.7' }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
      COMMONS_DIR: ios/runanywhere-sdks-latest/sdk/runanywhere-commons

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort | tail -1)

      - name: Install cmake + ninja
        run: brew install cmake ninja

      - name: Cache third_party deps
        uses: actions/cache@v4
        with:
          path: ${{ env.COMMONS_DIR }}/third_party
          key: runanywhere-thirdparty-${{ hashFiles('ios/runanywhere-sdks-latest/sdk/runanywhere-commons/scripts/ios/download-onnx.sh', 'ios/runanywhere-sdks-latest/sdk/runanywhere-commons/scripts/ios/download-sherpa-onnx.sh') }}

      - name: Build RACommons + RABackendLLAMACPP
        working-directory: ${{ env.COMMONS_DIR }}
        run: |
          chmod +x scripts/build-ios.sh
          ./scripts/build-ios.sh --backend llamacpp
          echo "=== dist/ contents ==="
          ls -lh dist/

      - name: Package XCFrameworks as ZIPs
        working-directory: ${{ env.COMMONS_DIR }}/dist
        run: |
          zip -r "RACommons-v${SDK_VERSION}.zip" RACommons.xcframework
          zip -r "RABackendLLAMACPP-v${SDK_VERSION}.zip" RABackendLLAMACPP.xcframework
          echo "=== package checksums ==="
          shasum -a 256 "RACommons-v${SDK_VERSION}.zip" "RABackendLLAMACPP-v${SDK_VERSION}.zip" | tee checksums.txt

      - name: Create GitHub Release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ env.COMMONS_DIR }}/dist
        run: |
          gh release create "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --title "iOS SDK ${SDK_VERSION} (patched v9)" \
            --notes "Patched RunAnywhere SDK v${SDK_VERSION}:
          - iOS LlamaCPP build uses official ggml-org/llama.cpp b9174 (latest checked 2026-05-16 UTC) for newer quantization support, including the Ternary Bonsai Q2_0 path
          - Link-complete llama.cpp b9174 packaging by bundling libllama-common/libllama-common-base and all mtmd model implementations
          - MAX_BATCH_SIZE = 2048 (was 4096) — fixes OOM on Gemma 4B (Q2_K)
          - MAX_UBATCH_SIZE = 512
          - Built from ios/runanywhere-sdks-latest local source
          
          Update ios/runanywhere-sdks-latest/Package.swift checksums to use these assets." \
            --prerelease \
            "RACommons-v${SDK_VERSION}.zip" \
            "RABackendLLAMACPP-v${SDK_VERSION}.zip" \
            checksums.txt \
            || gh release upload "${RELEASE_TAG}" \
              --repo "${{ github.repository }}" \
              --clobber \
              "RACommons-v${SDK_VERSION}.zip" \
              "RABackendLLAMACPP-v${SDK_VERSION}.zip" \
              checksums.txt
